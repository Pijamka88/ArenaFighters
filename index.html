<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Disciples: Неоновые поля</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: #0b0d15;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        #game-container {
            width: 100%;
            height: 100vh;
            max-width: 600px;
            background: rgba(10, 13, 20, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 150, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* МЕНЮ */
        .menu-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 16px;
            height: 100%;
            justify-content: center;
        }
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #f5e6d3, #dbbf9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .sub {
            text-align: center;
            color: #a89f91;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: -10px;
        }
        .class-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 12px 0 8px;
        }
        .class-card {
            background: linear-gradient(145deg, #262d3e, #1b212f);
            border-radius: 30px;
            padding: 14px 18px;
            border: 1px solid rgba(230, 200, 150, 0.15);
            box-shadow: 0 6px 0 #0f121b;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: 0.1s ease;
            cursor: pointer;
            position: relative;
        }
        .class-card:active { transform: translateY(4px); box-shadow: 0 2px 0 #0f121b; }
        .card-icon {
            width: 60px; height: 60px;
            background: #2f3a4f;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            border: 3px solid #bfa07e;
            box-shadow: 0 0 15px rgba(255,215,150,0.3);
        }
        .card-info h3 { color: #eedcc7; font-size: 1.5rem; }
        .card-info p { color: #9b8f7c; font-size: 1rem; display: flex; gap: 15px; margin-top: 5px; }
        .card-info p span { display: flex; align-items: center; gap: 5px; }

        /* ГЛОБАЛЬНАЯ КАРТА с новым дизайном клеток */
        .map-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0f121b;
        }
        .map-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.6); padding: 6px 10px;
            border-bottom: 1px solid #4a3f33; color: #f0dcc0;
            font-size: 0.9rem;
        }
        .income-timer {
            display: flex; gap: 10px; align-items: center;
        }
        .income-display {
            background: #2c3349; padding: 3px 8px; border-radius: 20px;
            color: #ffd966; font-weight: bold;
        }
        .castle-buttons {
            display: flex; gap: 4px; align-items: center;
        }
        .gold-display {
            background: #2c3349; padding: 4px 8px; border-radius: 20px;
            color: #ffd966; font-weight: bold; margin-right: 4px;
        }
        .castle-btn {
            background: #2f354a; border: none; color: #ebd5b0; padding: 4px 8px;
            border-radius: 40px; font-weight: 600; font-size: 0.7rem;
            box-shadow: 0 4px 0 #161c29; cursor: pointer; border: 1px solid #7a6e5b;
        }
        .castle-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #161c29; }
        .map-canvas-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #1a1f2e; padding: 8px;
        }
        #mapCanvas {
            display: block; width: 100%; aspect-ratio: 1/1;
            background: transparent;
            border-radius: 16px; box-shadow: 0 0 0 2px #4f556b; cursor: pointer;
        }
        .map-footer {
            display: flex; gap: 10px; padding: 8px 16px;
            background: #0f121b; border-top: 1px solid #2f354a;
        }
        .map-footer button {
            flex: 1; background: #2c3349; border: none; padding: 8px 0;
            border-radius: 36px; color: #f8e5cf; font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 5px 0 #151c2b; cursor: pointer; border: 1px solid #7a715e;
        }
        .map-footer button:active { transform: translateY(4px); box-shadow: 0 1px 0 #151c2b; }

        /* ЭКРАН ТАВЕРНЫ - увеличенное окно армии */
        .tavern-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0c0f18;
            padding: 8px;
        }
        .tavern-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px;
        }
        .tavern-title {
            font-size: 1.4rem; color: #eedcc7;
        }
        .tavern-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        .tavern-item {
            background: linear-gradient(145deg, #2f3a4f, #1e2636);
            border-radius: 16px;
            padding: 8px;
            border: 2px solid #bfa07e;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.1s;
        }
        .tavern-item:active { transform: scale(0.98); }
        .tavern-icon {
            font-size: 2.5rem;
            width: 50px; height: 50px;
            background: #1b212f;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid gold;
        }
        .tavern-info {
            flex: 1;
        }
        .tavern-info h3 { color: #ffd966; font-size: 1.1rem; }
        .tavern-info p { color: #c5bba8; font-size: 0.9rem; display: flex; gap: 10px; }
        .tavern-cost {
            font-size: 1.1rem; color: gold; font-weight: bold;
        }
        .army-preview {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #7a6e5b; /* уменьшенная рамка */
            margin-bottom: 8px;
            flex: 2;
            min-height: 100px;
            overflow-y: auto;
        }
        .army-title {
            color: #eedcc7; font-size: 0.9rem; margin-bottom: 5px;
        }
        .army-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .army-unit {
            background: #2c3349;
            border-radius: 10px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
            border: 1px solid #bfa07e;
        }
        .army-unit span { font-size: 2rem; }
        .army-unit small { color: #c5bba8; font-size: 0.7rem; }
        .tavern-footer {
            display: flex; gap: 6px;
        }
        .tavern-footer button {
            flex: 1; background: #2c3349; border: none; padding: 8px 0;
            border-radius: 24px; color: #f8e5cf; font-weight: 700;
            box-shadow: 0 4px 0 #151c2b; cursor: pointer; border: 1px solid #7a715e;
            font-size: 0.9rem;
        }
        .tavern-footer button:active { transform: translateY(4px); box-shadow: 0 1px 0 #151c2b; }

        /* ЭКРАН БИТВЫ - новый крутой дизайн клеток */
        .battle-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0c0f18;
        }
        .battle-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); padding: 4px 8px;
            border-bottom: 2px solid #7a6953; color: #f0e0ca;
            font-weight: bold; font-size: 0.8rem;
        }
        .turn-indicator {
            display: flex; align-items: center; gap: 6px;
        }
        .turn-dot {
            width: 12px; height: 12px; border-radius: 12px;
            background: #565e73; transition: 0.2s;
        }
        .turn-dot.player-active { background: #7df0a2; box-shadow: 0 0 12px #72f791; }
        .turn-dot.enemy-active { background: #f07d7d; box-shadow: 0 0 12px #f77171; }
        .btn-menu {
            background: #2f354a; border: none; color: #ebd5b0; padding: 4px 8px;
            border-radius: 40px; font-weight: 600; font-size: 0.7rem;
            box-shadow: 0 4px 0 #161c29; cursor: pointer; border: 1px solid #7a6e5b;
        }
        .btn-menu:active { transform: translateY(4px); box-shadow: 0 1px 0 #161c29; }
        .battle-canvas-wrapper {
            flex: 4; display: flex; align-items: center; justify-content: center;
            background: #131725; padding: 2px;
        }
        #battleCanvas {
            display: block; width: 100%; height: auto;
            aspect-ratio: 7/11;
            background: transparent;
            border-radius: 16px; box-shadow: 0 0 0 2px #4f556b; cursor: pointer;
        }
        .unit-details {
            background: #0d101a;
            border-radius: 20px;
            margin: 2px 8px;
            padding: 4px 8px;
            color: #f2dbbd;
            border: 1px solid #8f7b64;
            min-height: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .unit-details span {
            color: #ffd966;
            font-size: 1.2rem;
        }
        .log-message {
            background: #0d101a;
            border-radius: 30px;
            margin: 2px 8px;
            padding: 4px 8px;
            font-size: 0.8rem;
            color: #f2dbbd;
            text-align: center;
            border: 1px solid #8f7b64;
            min-height: 2rem;
        }
        .battle-footer {
            display: flex; gap: 4px; padding: 2px 8px 4px;
            background: #0f121b; border-top: 1px solid #3a3f52;
        }
        .battle-footer button {
            flex: 1; background: #2c3349; border: none; padding: 6px 0;
            border-radius: 24px; color: #f8e5cf; font-weight: 700;
            box-shadow: 0 4px 0 #151c2b; cursor: pointer; border: 1px solid #7a715e;
            font-size: 0.8rem;
        }
        .battle-footer button:active { transform: translateY(4px); box-shadow: 0 1px 0 #151c2b; }
        .flee-btn {
            background: #6b3f3f !important;
            border-color: #b35f5f !important;
        }
        .hourglass-btn {
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div id="game-container">
    <!-- Меню выбора класса -->
    <div id="menu-screen" class="menu-screen">
        <div class="title">DISCIPLES</div>
        <div class="sub">НЕОНОВЫЕ ПОЛЯ</div>
        <div class="class-cards">
            <div class="class-card" data-class="warrior">
                <div class="card-icon">⚔️</div>
                <div class="card-info">
                    <h3>ВОИН</h3>
                    <p><span>❤️35</span> <span>⚔️7</span> <span>🦶3</span></p>
                </div>
            </div>
            <div class="class-card" data-class="mage">
                <div class="card-icon">🔮</div>
                <div class="card-info">
                    <h3>МАГ</h3>
                    <p><span>❤️24</span> <span>⚔️12</span> <span>🦶3</span></p>
                </div>
            </div>
            <div class="class-card" data-class="archer">
                <div class="card-icon">🏹</div>
                <div class="card-info">
                    <h3>ЛУЧНИК</h3>
                    <p><span>❤️28</span> <span>⚔️9</span> <span>🦶3</span></p>
                </div>
            </div>
        </div>
        <div style="color:#5f6b7a; text-align:center;">выберите героя → наймите воинов в таверне</div>
    </div>

    <!-- Глобальная карта -->
    <div id="map-screen" class="map-screen">
        <div class="map-header">
            <div class="income-timer">
                <span class="income-display" id="incomePerMin">💰 +<span id="incomeRate">1</span>/мин</span>
                <span class="income-display" id="timerDisplay">⏳ 5:00</span>
            </div>
            <div class="castle-buttons">
                <span class="gold-display" id="goldDisplay">💰 200</span>
                <button class="castle-btn" id="tavernBtn" style="display:none;">🍺 ТАВЕРНА</button>
                <button class="castle-btn" id="teleportBtn">🏰 ТЕЛЕПОРТ</button>
            </div>
        </div>
        <div class="map-canvas-container">
            <canvas id="mapCanvas" width="600" height="600"></canvas>
        </div>
        <div class="map-footer">
            <button id="menuFromMapBtn">⚙️ МЕНЮ</button>
        </div>
    </div>

    <!-- Экран таверны (увеличенная армия) -->
    <div id="tavern-screen" class="tavern-screen">
        <div class="tavern-header">
            <span class="tavern-title">🍺 ТАВЕРНА</span>
            <span class="gold-display" id="tavernGold">💰 200</span>
        </div>
        <div class="tavern-grid" id="tavernGrid"></div>
        <div class="army-preview">
            <div class="army-title">⚔️ ТВОЯ АРМИЯ (<span id="armyCount">0</span>/6)</div>
            <div class="army-grid" id="armyGrid"></div>
        </div>
        <div class="tavern-footer">
            <button id="closeTavernBtn">↩️ ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- Экран тактического боя с крутым дизайном клеток -->
    <div id="battle-screen" class="battle-screen">
        <div class="battle-header">
            <div class="turn-indicator">
                <span>ХОД:</span>
                <span class="turn-dot" id="turnPlayerDot"></span>
                <span class="turn-dot" id="turnEnemyDot"></span>
                <span id="turnText">Игрок</span>
            </div>
            <button class="btn-menu" id="menuFromBattleBtn">⚙️ МЕНЮ</button>
        </div>
        <div class="battle-canvas-wrapper">
            <canvas id="battleCanvas" width="700" height="1100"></canvas>
        </div>
        <div class="unit-details" id="unitDetails">Выберите юнита для просмотра характеристик</div>
        <div class="log-message" id="battleLog">Ваш ход. Выберите юнита</div>
        <div class="battle-footer">
            <button id="fleeBtn" class="flee-btn">🏃 СБЕЖАТЬ (-50💰)</button>
            <button id="endTurnBtn" class="hourglass-btn">⌛ ЗАВЕРШИТЬ</button>
        </div>
    </div>
</div>

<script>
(function() {
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.backgroundColor = '#0b0d15'; tg.setHeaderColor('#1a1f2e'); }

    // --- DOM элементы ---
    const menuScreen = document.getElementById('menu-screen');
    const mapScreen = document.getElementById('map-screen');
    const tavernScreen = document.getElementById('tavern-screen');
    const battleScreen = document.getElementById('battle-screen');
    const mapCanvas = document.getElementById('mapCanvas');
    const ctxMap = mapCanvas.getContext('2d');
    const battleCanvas = document.getElementById('battleCanvas');
    const ctxBattle = battleCanvas.getContext('2d');
    const battleLog = document.getElementById('battleLog');
    const turnPlayerDot = document.getElementById('turnPlayerDot');
    const turnEnemyDot = document.getElementById('turnEnemyDot');
    const turnText = document.getElementById('turnText');
    const tavernBtn = document.getElementById('tavernBtn');
    const teleportBtn = document.getElementById('teleportBtn');
    const menuFromMapBtn = document.getElementById('menuFromMapBtn');
    const menuFromBattleBtn = document.getElementById('menuFromBattleBtn');
    const endTurnBtn = document.getElementById('endTurnBtn');
    const fleeBtn = document.getElementById('fleeBtn');
    const goldDisplay = document.getElementById('goldDisplay');
    const tavernGold = document.getElementById('tavernGold');
    const tavernGrid = document.getElementById('tavernGrid');
    const closeTavernBtn = document.getElementById('closeTavernBtn');
    const armyGrid = document.getElementById('armyGrid');
    const armyCount = document.getElementById('armyCount');
    const unitDetails = document.getElementById('unitDetails');
    const incomeRateSpan = document.getElementById('incomeRate');
    const timerDisplay = document.getElementById('timerDisplay');

    // ---------- ГЛОБАЛЬНАЯ КАРТА ----------
    const MAP_SIZE = 100;
    const CAMERA_SIZE = 6;
    const CASTLE_POS = { x: Math.floor(MAP_SIZE/2), y: Math.floor(MAP_SIZE/2) };
    let worldMap = [];
    let enemiesOnMap = [];
    let mines = [];
    let lastIncomeTime = Date.now();
    const INCOME_INTERVAL = 5 * 60 * 1000;

    let gold = 200;
    function updateGoldDisplay() {
        goldDisplay.innerText = `💰 ${gold}`;
        tavernGold.innerText = `💰 ${gold}`;
    }

    function updateIncomeRate() {
        const playerMines = mines.filter(m => m.owner === 'player').length;
        const totalRate = 1 + playerMines;
        incomeRateSpan.innerText = totalRate;
    }

    function updateTimer() {
        const now = Date.now();
        const timeLeft = Math.max(0, INCOME_INTERVAL - (now - lastIncomeTime));
        const minutes = Math.floor(timeLeft / 60000);
        const seconds = Math.floor((timeLeft % 60000) / 1000);
        timerDisplay.innerText = `⏳ ${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function generateWorld() {
        worldMap = [];
        for (let y = 0; y < MAP_SIZE; y++) {
            let row = [];
            for (let x = 0; x < MAP_SIZE; x++) {
                let r = Math.random();
                if (r < 0.6) row.push(1);
                else if (r < 0.85) row.push(3);
                else row.push(2);
            }
            worldMap.push(row);
        }

        const roads = new Set();
        roads.add(`${CASTLE_POS.x},${CASTLE_POS.y}`);
        const directions = [[1,0],[-1,0],[0,1],[0,-1]];
        
        let mainDirs = [];
        for (let i = 0; i < 3; i++) {
            let dir;
            do {
                dir = directions[Math.floor(Math.random() * 4)];
            } while (mainDirs.some(d => d[0] === dir[0] && d[1] === dir[1]));
            mainDirs.push(dir);
        }

        mainDirs.forEach(dir => {
            let x = CASTLE_POS.x;
            let y = CASTLE_POS.y;
            let length = 50 + Math.floor(Math.random() * 30);
            for (let step = 0; step < length; step++) {
                x = Math.max(0, Math.min(MAP_SIZE-1, x + dir[0]));
                y = Math.max(0, Math.min(MAP_SIZE-1, y + dir[1]));
                roads.add(`${x},${y}`);
                if (step % 7 === 0) {
                    let bx = x, by = y;
                    for (let b = 0; b < 10; b++) {
                        const bdir = directions[Math.floor(Math.random() * 4)];
                        bx = Math.max(0, Math.min(MAP_SIZE-1, bx + bdir[0]));
                        by = Math.max(0, Math.min(MAP_SIZE-1, by + bdir[1]));
                        roads.add(`${bx},${by}`);
                    }
                }
            }
        });

        for (let i = 0; i < 60; i++) {
            let x = CASTLE_POS.x + Math.floor(Math.random() * 60 - 30);
            let y = CASTLE_POS.y + Math.floor(Math.random() * 60 - 30);
            x = Math.max(0, Math.min(MAP_SIZE-1, x));
            y = Math.max(0, Math.min(MAP_SIZE-1, y));
            for (let step = 0; step < 20; step++) {
                const dir = directions[Math.floor(Math.random() * 4)];
                x = Math.max(0, Math.min(MAP_SIZE-1, x + dir[0]));
                y = Math.max(0, Math.min(MAP_SIZE-1, y + dir[1]));
                roads.add(`${x},${y}`);
            }
        }

        roads.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            worldMap[y][x] = 0;
        });

        mines = [];
        for (let i = 0; i < 20; i++) {
            let x = Math.floor(Math.random() * MAP_SIZE);
            let y = Math.floor(Math.random() * MAP_SIZE);
            if (worldMap[y][x] === 0 && !(x === CASTLE_POS.x && y === CASTLE_POS.y)) {
                mines.push({ x, y, owner: null });
            }
        }
    }

    function generateEnemies() {
        enemiesOnMap = [];
        const enemyTemplates = [
            { type: 'Скелет', hp: 18, maxHp: 18, attack: 5, icon: '💀', moveRange: 3, attackRange: 1 },
            { type: 'Тень', hp: 16, maxHp: 16, attack: 6, icon: '👤', moveRange: 4, attackRange: 1 },
            { type: 'Рыцарь смерти', hp: 24, maxHp: 24, attack: 7, icon: '⚔️', moveRange: 3, attackRange: 1 },
            { type: 'Гоблин', hp: 14, maxHp: 14, attack: 4, icon: '👺', moveRange: 4, attackRange: 1 },
            { type: 'Орк', hp: 22, maxHp: 22, attack: 6, icon: '👹', moveRange: 3, attackRange: 1 }
        ];
        const occupied = new Set([`${CASTLE_POS.x},${CASTLE_POS.y}`]);
        mines.forEach(m => occupied.add(`${m.x},${m.y}`));
        
        for (let i = 0; i < 40; i++) {
            let attempts = 0;
            while (attempts < 500) {
                const x = Math.floor(Math.random() * MAP_SIZE);
                const y = Math.floor(Math.random() * MAP_SIZE);
                const key = `${x},${y}`;
                if (!occupied.has(key) && worldMap[y][x] === 0) {
                    occupied.add(key);
                    const units = [];
                    for (let j = 0; j < 5; j++) {
                        const tmpl = enemyTemplates[Math.floor(Math.random() * enemyTemplates.length)];
                        units.push({ ...tmpl, hp: tmpl.maxHp, team: 'enemy' });
                    }
                    enemiesOnMap.push({ x, y, units });
                    break;
                }
                attempts++;
            }
        }
    }

    let playerHero = null;
    let playerWarriors = [];

    const heroByClass = {
        warrior: { type: 'Герой-воин', hp: 35, maxHp: 35, attack: 7, team: 'player', icon: '⚔️', moveRange: 3, attackRange: 1 },
        mage: { type: 'Герой-маг', hp: 24, maxHp: 24, attack: 12, team: 'player', icon: '🔮', moveRange: 3, attackRange: 3 },
        archer: { type: 'Герой-лучник', hp: 28, maxHp: 28, attack: 9, team: 'player', icon: '🏹', moveRange: 3, attackRange: 4 }
    };

    let playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };

    function checkIncome() {
        const now = Date.now();
        if (now - lastIncomeTime >= INCOME_INTERVAL) {
            const intervals = Math.floor((now - lastIncomeTime) / INCOME_INTERVAL);
            if (intervals > 0) {
                let income = intervals * 1;
                const playerMines = mines.filter(m => m.owner === 'player').length;
                income += intervals * playerMines;
                gold += income;
                updateGoldDisplay();
                lastIncomeTime += intervals * INCOME_INTERVAL;
                battleLog.innerText = `Доход: +${income}💰`;
                updateIncomeRate();
            }
        }
    }

    // Новый крутой дизайн клеток для карты
    function drawMap() {
        checkIncome();
        updateTimer();
        ctxMap.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
        const cellSize = mapCanvas.width / CAMERA_SIZE;
        let startX = playerPos.x - Math.floor(CAMERA_SIZE/2);
        let startY = playerPos.y - Math.floor(CAMERA_SIZE/2);
        startX = Math.max(0, Math.min(MAP_SIZE - CAMERA_SIZE, startX));
        startY = Math.max(0, Math.min(MAP_SIZE - CAMERA_SIZE, startY));

        tavernBtn.style.display = (playerPos.x === CASTLE_POS.x && playerPos.y === CASTLE_POS.y) ? 'inline-block' : 'none';

        for (let i = 0; i < CAMERA_SIZE; i++) {
            for (let j = 0; j < CAMERA_SIZE; j++) {
                const worldX = startX + j;
                const worldY = startY + i;
                const cellType = worldMap[worldY][worldX];
                const x = j * cellSize;
                const y = i * cellSize;

                // Металлический градиент с неоновой подсветкой
                const grad = ctxMap.createLinearGradient(x, y, x+cellSize, y+cellSize);
                if (cellType === 0) {
                    grad.addColorStop(0, '#c0a070');
                    grad.addColorStop(1, '#8b6b4b');
                    ctxMap.shadowColor = '#ffaa33';
                } else if (cellType === 1) {
                    grad.addColorStop(0, '#5f8b5f');
                    grad.addColorStop(1, '#2f5a2f');
                    ctxMap.shadowColor = '#88ff88';
                } else if (cellType === 2) {
                    grad.addColorStop(0, '#5f9fff');
                    grad.addColorStop(1, '#2f5f9f');
                    ctxMap.shadowColor = '#aaddff';
                } else {
                    grad.addColorStop(0, '#8faf7f');
                    grad.addColorStop(1, '#5f7f4f');
                    ctxMap.shadowColor = '#ccffaa';
                }
                
                ctxMap.shadowBlur = 15;
                ctxMap.fillStyle = grad;
                ctxMap.fillRect(x, y, cellSize, cellSize);
                
                ctxMap.shadowBlur = 0;
                ctxMap.strokeStyle = 'rgba(255,255,255,0.3)';
                ctxMap.lineWidth = 2;
                ctxMap.strokeRect(x+1, y+1, cellSize-2, cellSize-2);

                ctxMap.font = `${cellSize-30}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
                ctxMap.textAlign = 'center';
                ctxMap.textBaseline = 'middle';

                if (cellType === 1) {
                    ctxMap.fillStyle = '#aaffaa';
                    ctxMap.fillText('🌲', x + cellSize/2, y + cellSize/2);
                }

                const mineHere = mines.find(m => m.x === worldX && m.y === worldY);
                if (mineHere) {
                    if (mineHere.owner === 'player') {
                        ctxMap.fillStyle = '#ffd966';
                        ctxMap.fillText('⛏️', x + cellSize/2 - 8, y + cellSize/2 - 5);
                        ctxMap.fillStyle = '#a0f0c0';
                        ctxMap.fillText('✔️', x + cellSize/2 + 8, y + cellSize/2 + 3);
                    } else {
                        ctxMap.fillStyle = '#c0c0c0';
                        ctxMap.fillText('⛏️', x + cellSize/2, y + cellSize/2);
                    }
                }

                if (worldX === CASTLE_POS.x && worldY === CASTLE_POS.y) {
                    ctxMap.fillStyle = '#f5c99e';
                    ctxMap.fillText('🏰', x + cellSize/2, y + cellSize/2);
                }
                const enemyHere = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
                if (enemyHere) {
                    ctxMap.fillStyle = '#d96f6f';
                    ctxMap.fillText('👾', x + cellSize/2, y + cellSize/2);
                }
                if (playerPos.x === worldX && playerPos.y === worldY) {
                    ctxMap.fillStyle = '#a0f0c0';
                    ctxMap.fillText(playerHero.icon, x + cellSize/2, y + cellSize/2);
                }
            }
        }
    }

    function handleMapClick(e) {
        const rect = mapCanvas.getBoundingClientRect();
        const scale = mapCanvas.width / rect.width;
        const mouseX = (e.clientX - rect.left) * scale;
        const mouseY = (e.clientY - rect.top) * scale;
        const cellSize = mapCanvas.width / CAMERA_SIZE;
        const col = Math.floor(mouseX / cellSize);
        const row = Math.floor(mouseY / cellSize);
        if (col < 0 || col >= CAMERA_SIZE || row < 0 || row >= CAMERA_SIZE) return;

        let startX = playerPos.x - Math.floor(CAMERA_SIZE/2);
        let startY = playerPos.y - Math.floor(CAMERA_SIZE/2);
        startX = Math.max(0, Math.min(MAP_SIZE - CAMERA_SIZE, startX));
        startY = Math.max(0, Math.min(MAP_SIZE - CAMERA_SIZE, startY));
        const worldX = startX + col;
        const worldY = startY + row;

        if (Math.abs(worldX - playerPos.x) + Math.abs(worldY - playerPos.y) !== 1) return;
        if (worldMap[worldY][worldX] !== 0) {
            battleLog.innerText = 'Можно ходить только по дорогам!';
            return;
        }

        playerPos = { x: worldX, y: worldY };
        drawMap();

        const mineHere = mines.find(m => m.x === worldX && m.y === worldY);
        if (mineHere && mineHere.owner !== 'player') {
            const mineGuard = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
            if (mineGuard) {
                startBattle(mineGuard, true);
            } else {
                mineHere.owner = 'player';
                updateIncomeRate();
                battleLog.innerText = 'Шахта захвачена! +1💰 каждые 5 мин';
                drawMap();
            }
        } else {
            const enemyHere = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
            if (enemyHere) startBattle(enemyHere, false);
        }
    }

    // ---------- ТАВЕРНА ----------

        armyGrid.innerHTML = '';
        const allUnits = [playerHero, ...playerWarriors].filter(u => u.hp > 0);
        armyCount.innerText = allUnits.length;

    function hireUnit(tmpl) {
        if (gold < tmpl.cost) {
            battleLog.innerText = `Не хватает золота! Нужно ${tmpl.cost}`;
            return;
        }
        const aliveWarriors = playerWarriors.filter(w => w.hp > 0);
        if (aliveWarriors.length >= 5) {
            battleLog.innerText = 'В отряде уже 5 воинов! (максимум 5 + герой)';
            return;
        }

        gold -= tmpl.cost;
        updateGoldDisplay();
        const newWarrior = { ...tmpl, hp: tmpl.maxHp, team: 'player' };
        playerWarriors.push(newWarrior);
        battleLog.innerText = `Нанят ${newWarrior.type}`;
        
        updateArmyDisplay();
        openTavern();
    }

    // ---------- ТАКТИЧЕСКИЙ БОЙ 7x11 (новый дизайн клеток) ----------
    const BATTLE_WIDTH = 7;
    const BATTLE_HEIGHT = 11;
    let battlePlayerUnits = [];
    let battleEnemyUnits = [];
    let corpses = [];
    let currentTurn = 'player';
    let selectedUnitId = null;
    let battleActive = false;
    let currentEnemyPos = null;
    let nextId = 1000;
    let isMineBattle = false;
    let animationInProgress = false;

    function setupBattleUnits(enemyUnitsData) {
        battlePlayerUnits = [];
        battleEnemyUnits = [];

        const allPlayer = [playerHero, ...playerWarriors].filter(u => u.hp > 0);
        
        let playerPositions = [];
        for (let y = 6; y < BATTLE_HEIGHT; y++) {
            for (let x = 0; x <= 1; x++) {
                playerPositions.push({ x, y });
            }
        }
        playerPositions = playerPositions.sort(() => Math.random() - 0.5);
        for (let i = 0; i < Math.min(allPlayer.length, playerPositions.length); i++) {
            const pos = playerPositions[i];
            battlePlayerUnits.push({
                ...allPlayer[i],
                id: nextId++,
                x: pos.x,
                y: pos.y,
                actedThisTurn: false
            });
        }

        let enemyPositions = [];
        for (let y = 0; y < 5; y++) {
            for (let x = 5; x <= 6; x++) {
                enemyPositions.push({ x, y });
            }
        }
        enemyPositions = enemyPositions.sort(() => Math.random() - 0.5);
        for (let i = 0; i < Math.min(enemyUnitsData.length, enemyPositions.length); i++) {
            const pos = enemyPositions[i];
            battleEnemyUnits.push({
                ...enemyUnitsData[i],
                id: nextId++,
                x: pos.x,
                y: pos.y,
                actedThisTurn: false
            });
        }
    }

    // Крутой дизайн клеток для боя
    function drawBattle() {
        ctxBattle.clearRect(0, 0, battleCanvas.width, battleCanvas.height);
        const cellSize = battleCanvas.width / BATTLE_WIDTH;

        for (let y = 0; y < BATTLE_HEIGHT; y++) {
            for (let x = 0; x < BATTLE_WIDTH; x++) {
                // Металлический градиент с неоном
                const grad = ctxBattle.createLinearGradient(
                    x * cellSize, y * cellSize,
                    (x+1) * cellSize, (y+1) * cellSize
                );
                grad.addColorStop(0, '#2a3a5a');
                grad.addColorStop(0.5, '#1a2a3a');
                grad.addColorStop(1, '#0a1a2a');
                
                ctxBattle.fillStyle = grad;
                ctxBattle.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                
                // Неоновая подсветка краев
                ctxBattle.strokeStyle = '#3f9fff';
                ctxBattle.lineWidth = 1;
                ctxBattle.shadowColor = '#3f9fff';
                ctxBattle.shadowBlur = 10;
                ctxBattle.strokeRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
                ctxBattle.shadowBlur = 0;
            }
        }

        // Подсветка доступных клеток
        if (selectedUnitId && currentTurn === 'player' && !animationInProgress) {
            const selected = battlePlayerUnits.find(u => u.id === selectedUnitId);
            if (selected && selected.hp > 0 && !selected.actedThisTurn) {
                const moveRange = selected.moveRange || 3;
                const attackRange = selected.attackRange || 1;
                
                for (let dy = -moveRange; dy <= moveRange; dy++) {
                    for (let dx = -moveRange; dx <= moveRange; dx++) {
                        if (Math.abs(dx) + Math.abs(dy) > moveRange) continue;
                        const nx = selected.x + dx;
                        const ny = selected.y + dy;
                        if (nx < 0 || nx >= BATTLE_WIDTH || ny < 0 || ny >= BATTLE_HEIGHT) continue;
                        const occupiedByPlayer = battlePlayerUnits.some(u => u.x === nx && u.y === ny && u.hp > 0);
                        const occupiedByEnemy = battleEnemyUnits.some(u => u.x === nx && u.y === ny && u.hp > 0);
                        if (!occupiedByPlayer && !occupiedByEnemy) {
                            ctxBattle.fillStyle = 'rgba(100, 255, 100, 0.25)';
                            ctxBattle.fillRect(nx * cellSize, ny * cellSize, cellSize, cellSize);
                        }
                    }
                }
                
                for (let dy = -attackRange; dy <= attackRange; dy++) {
                    for (let dx = -attackRange; dx <= attackRange; dx++) {
                        if (Math.abs(dx) + Math.abs(dy) > attackRange) continue;
                        const nx = selected.x + dx;
                        const ny = selected.y + dy;
                        if (nx < 0 || nx >= BATTLE_WIDTH || ny < 0 || ny >= BATTLE_HEIGHT) continue;
                        const enemy = battleEnemyUnits.find(u => u.x === nx && u.y === ny && u.hp > 0);
                        if (enemy) {
                            ctxBattle.fillStyle = 'rgba(255, 80, 80, 0.35)';
                            ctxBattle.fillRect(nx * cellSize, ny * cellSize, cellSize, cellSize);
                        }
                    }
                }
            }
        }

        ctxBattle.shadowBlur = 0;
        ctxBattle.font = `${cellSize-30}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.textAlign = 'center';
        ctxBattle.textBaseline = 'middle';
        corpses.forEach(corpse => {
            const x = corpse.x * cellSize;
            const y = corpse.y * cellSize;
            ctxBattle.fillStyle = 'rgba(255,255,255,0.5)';
            ctxBattle.fillText('💀', x + cellSize/2, y + cellSize/2);
        });

        battlePlayerUnits.forEach(u => drawUnitStatic(u, true, cellSize));
        battleEnemyUnits.forEach(u => drawUnitStatic(u, false, cellSize));
    }

    function drawUnitStatic(unit, isPlayer, cellSize) {
        if (unit.hp <= 0) return;
        const x = unit.x * cellSize;
        const y = unit.y * cellSize;
        
        // Круглая рамка вместо квадратной
        ctxBattle.beginPath();
        ctxBattle.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 5, 0, 2 * Math.PI);
        ctxBattle.strokeStyle = isPlayer ? '#7df0a2' : '#f07d7d';
        ctxBattle.lineWidth = 4;
        ctxBattle.shadowColor = isPlayer ? '#7df0a2' : '#f07d7d';
        ctxBattle.shadowBlur = 15;
        ctxBattle.stroke();
        
        if (unit.id === selectedUnitId && currentTurn === 'player' && isPlayer) {
            ctxBattle.beginPath();
            ctxBattle.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 3, 0, 2 * Math.PI);
            ctxBattle.strokeStyle = 'gold';
            ctxBattle.lineWidth = 3;
            ctxBattle.shadowColor = 'gold';
            ctxBattle.shadowBlur = 20;
            ctxBattle.stroke();
        }
        
        ctxBattle.shadowBlur = 0;
        ctxBattle.font = `${cellSize-35}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.fillStyle = isPlayer ? '#c3e3ff' : '#ffb6b6';
        ctxBattle.fillText(unit.icon || '❓', x + cellSize/2, y + cellSize/2 - 5);

        const barWidth = 45;
        const barHeight = 7;
        const barX = x + (cellSize - barWidth) / 2;
        const barY = y + cellSize - 16;
        const hpPercent = unit.hp / unit.maxHp;

        ctxBattle.fillStyle = '#222';
        ctxBattle.beginPath();
        ctxBattle.roundRect(barX, barY, barWidth, barHeight, 4);
        ctxBattle.fill();

        ctxBattle.fillStyle = hpPercent > 0.6 ? '#5ac46a' : (hpPercent > 0.3 ? '#efb15e' : '#d84f4f');
        ctxBattle.beginPath();
        ctxBattle.roundRect(barX, barY, barWidth * hpPercent, barHeight, 4);
        ctxBattle.fill();
    }

    // Анимация прыжка
    function animateJump(unit, fromX, fromY, toX, toY, callback) {
        if (animationInProgress) {
            if (callback) callback();
            return;
        }
        animationInProgress = true;
        const startTime = performance.now();
        const duration = 250;

        function animate(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const jumpHeight = Math.sin(progress * Math.PI) * 30;

            drawBattleWithAnimation(unit, fromX, fromY, toX, toY, progress, jumpHeight);

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                unit.x = toX;
                unit.y = toY;
                animationInProgress = false;
                drawBattle();
                if (callback) callback();
            }
        }
        requestAnimationFrame(animate);
    }

    function drawBattleWithAnimation(movingUnit, fromX, fromY, toX, toY, progress, jumpHeight) {
        ctxBattle.clearRect(0, 0, battleCanvas.width, battleCanvas.height);
        const cellSize = battleCanvas.width / BATTLE_WIDTH;

        for (let y = 0; y < BATTLE_HEIGHT; y++) {
            for (let x = 0; x < BATTLE_WIDTH; x++) {
                const grad = ctxBattle.createLinearGradient(
                    x * cellSize, y * cellSize,
                    (x+1) * cellSize, (y+1) * cellSize
                );
                grad.addColorStop(0, '#2a3a5a');
                grad.addColorStop(0.5, '#1a2a3a');
                grad.addColorStop(1, '#0a1a2a');
                
                ctxBattle.fillStyle = grad;
                ctxBattle.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                
                ctxBattle.strokeStyle = '#3f9fff';
                ctxBattle.lineWidth = 1;
                ctxBattle.shadowColor = '#3f9fff';
                ctxBattle.shadowBlur = 10;
                ctxBattle.strokeRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
                ctxBattle.shadowBlur = 0;
            }
        }

        ctxBattle.font = `${cellSize-30}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.textAlign = 'center';
        ctxBattle.textBaseline = 'middle';
        corpses.forEach(corpse => {
            const x = corpse.x * cellSize;
            const y = corpse.y * cellSize;
            ctxBattle.fillStyle = 'rgba(255,255,255,0.5)';
            ctxBattle.fillText('💀', x + cellSize/2, y + cellSize/2);
        });

        battlePlayerUnits.forEach(u => {
            if (u.id === movingUnit.id || u.hp <= 0) return;
            drawUnitStatic(u, true, cellSize);
        });
        battleEnemyUnits.forEach(u => {
            if (u.id === movingUnit.id || u.hp <= 0) return;
            drawUnitStatic(u, false, cellSize);
        });

        const x = (fromX + (toX - fromX) * progress) * cellSize;
        const y = (fromY + (toY - fromY) * progress) * cellSize - jumpHeight;
        
        ctxBattle.beginPath();
        ctxBattle.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 5, 0, 2 * Math.PI);
        ctxBattle.strokeStyle = movingUnit.team === 'player' ? '#7df0a2' : '#f07d7d';
        ctxBattle.lineWidth = 4;
        ctxBattle.shadowColor = movingUnit.team === 'player' ? '#7df0a2' : '#f07d7d';
        ctxBattle.shadowBlur = 15;
        ctxBattle.stroke();
        ctxBattle.shadowBlur = 0;
        
        ctxBattle.font = `${cellSize-35}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.fillStyle = movingUnit.team === 'player' ? '#c3e3ff' : '#ffb6b6';
        ctxBattle.fillText(movingUnit.icon || '❓', x + cellSize/2, y + cellSize/2 - 5);

        const barWidth = 45;
        const barHeight = 7;
        const barX = x + (cellSize - barWidth) / 2;
        const barY = y + cellSize - 16;
        const hpPercent = movingUnit.hp / movingUnit.maxHp;

        ctxBattle.fillStyle = '#222';
        ctxBattle.beginPath();
        ctxBattle.roundRect(barX, barY, barWidth, barHeight, 4);
        ctxBattle.fill();

        ctxBattle.fillStyle = hpPercent > 0.6 ? '#5ac46a' : (hpPercent > 0.3 ? '#efb15e' : '#d84f4f');
        ctxBattle.beginPath();
        ctxBattle.roundRect(barX, barY, barWidth * hpPercent, barHeight, 4);
        ctxBattle.fill();
    }

    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        return this;
    };

    function checkBattleEnd() {
        const playerAlive = battlePlayerUnits.some(u => u.hp > 0);
        const enemyAlive = battleEnemyUnits.some(u => u.hp > 0);
        if (!playerAlive) return 'lose';
        if (!enemyAlive) return 'win';
        return 'ongoing';
    }

    function endBattle(win) {
        if (win) {
            if (isMineBattle) {
                const mine = mines.find(m => m.x === currentEnemyPos.x && m.y === currentEnemyPos.y);
                if (mine) mine.owner = 'player';
                updateIncomeRate();
            }
            enemiesOnMap = enemiesOnMap.filter(e => !(e.x === currentEnemyPos.x && e.y === currentEnemyPos.y));
            playerHero = battlePlayerUnits.find(u => u.type.includes('Герой')) || playerHero;
            playerWarriors = battlePlayerUnits.filter(u => !u.type.includes('Герой'));
        } else {
            playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
            playerHero.hp = playerHero.maxHp;
            playerWarriors.forEach(w => w.hp = w.maxHp);
        }
        corpses = [];
        isMineBattle = false;
        showMap();
        drawMap();
    }

    function showUnitDetails(unit) {
        if (!unit) {
            unitDetails.innerHTML = 'Выберите юнита для просмотра характеристик';
            return;
        }
        unitDetails.innerHTML = `
            <span>${unit.icon}</span>
            <div><strong>${unit.type}</strong> | ❤️ ${unit.hp}/${unit.maxHp} | ⚔️ ${unit.attack} | 🦶 ${unit.moveRange} | 🏹 ${unit.attackRange}</div>
        `;
    }

    function handleBattleClick(e) {
        if (!battleActive || animationInProgress) return;
        
        const rect = battleCanvas.getBoundingClientRect();
        const scaleX = battleCanvas.width / rect.width;
        const scaleY = battleCanvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        const cellSize = battleCanvas.width / BATTLE_WIDTH;
        const gridX = Math.floor(mouseX / cellSize);
        const gridY = Math.floor(mouseY / cellSize);
        if (gridX < 0 || gridX >= BATTLE_WIDTH || gridY < 0 || gridY >= BATTLE_HEIGHT) return;

        const clickedPlayer = battlePlayerUnits.find(u => u.x === gridX && u.y === gridY && u.hp > 0);
        const clickedEnemy = battleEnemyUnits.find(u => u.x === gridX && u.y === gridY && u.hp > 0);

        if (clickedPlayer) {
            showUnitDetails(clickedPlayer);
            if (currentTurn === 'player') {
                selectedUnitId = clickedPlayer.id;
                drawBattle();
                battleLog.innerText = `Выбран ${clickedPlayer.type}`;
            }
            return;
        }
        
        if (clickedEnemy) {
            showUnitDetails(clickedEnemy);
            if (currentTurn === 'player' && selectedUnitId) {
                const unit = battlePlayerUnits.find(u => u.id === selectedUnitId);
                if (unit && unit.hp > 0 && !unit.actedThisTurn) {
                    const dist = Math.abs(unit.x - gridX) + Math.abs(unit.y - gridY);
                    if (dist <= (unit.attackRange || 1)) {
                        clickedEnemy.hp = Math.max(0, clickedEnemy.hp - unit.attack);
                        if (clickedEnemy.hp <= 0) {
                            corpses.push({ x: clickedEnemy.x, y: clickedEnemy.y });
                        }
                        battleLog.innerText = `${unit.type} атакует ${clickedEnemy.type}`;
                        unit.actedThisTurn = true;
                        selectedUnitId = null;
                        showUnitDetails(null);
                        drawBattle();
                        
                        const end = checkBattleEnd();
                        if (end === 'win') setTimeout(() => endBattle(true), 200);
                        else if (end === 'lose') setTimeout(() => endBattle(false), 200);
                    } else {
                        battleLog.innerText = 'Слишком далеко для атаки';
                    }
                } else {
                    selectedUnitId = null;
                    drawBattle();
                }
            }
            return;
        }

        if (currentTurn === 'player' && selectedUnitId && !animationInProgress) {
            const unit = battlePlayerUnits.find(u => u.id === selectedUnitId);
            if (!unit || unit.hp <= 0 || unit.actedThisTurn) {
                selectedUnitId = null;
                drawBattle();
                return;
            }

            const dist = Math.abs(unit.x - gridX) + Math.abs(unit.y - gridY);
            if (dist > (unit.moveRange || 3)) {
                battleLog.innerText = 'Слишком далеко для перемещения';
                return;
            }

            const occupiedByPlayer = battlePlayerUnits.some(u => u.x === gridX && u.y === gridY && u.hp > 0);
            const occupiedByEnemy = battleEnemyUnits.some(u => u.x === gridX && u.y === gridY && u.hp > 0);
            
            if (!occupiedByPlayer && !occupiedByEnemy) {
                const corpseIndex = corpses.findIndex(c => c.x === gridX && c.y === gridY);
                if (corpseIndex !== -1) {
                    corpses.splice(corpseIndex, 1);
                }

                animateJump(unit, unit.x, unit.y, gridX, gridY, () => {
                    unit.actedThisTurn = true;
                    selectedUnitId = null;
                    showUnitDetails(null);
                    battleLog.innerText = `${unit.type} переместился`;
                    drawBattle();
                });
            } else {
                battleLog.innerText = 'Клетка занята';
            }
        } else if (currentTurn === 'player') {
            battleLog.innerText = 'Выберите своего юнита';
        }
    }

    function enemyTurn() {
        if (!battleActive || currentTurn !== 'enemy' || animationInProgress) return;

        const enemies = battleEnemyUnits.filter(u => u.hp > 0);
        let index = 0;

        function processNextEnemy() {
            if (!battleActive) return;
            if (index >= enemies.length) {
                battlePlayerUnits.forEach(u => u.actedThisTurn = false);
                currentTurn = 'player';
                selectedUnitId = null;
                showUnitDetails(null);
                updateTurnDisplay();
                drawBattle();
                battleLog.innerText = 'Ваш ход. Выберите юнита.';
                return;
            }

            const enemy = enemies[index];
            index++;

            const players = battlePlayerUnits.filter(u => u.hp > 0);
            if (players.length === 0) {
                endBattle(false);
                return;
            }

            let closest = null;
            let minDist = Infinity;
            players.forEach(p => {
                const d = Math.abs(enemy.x - p.x) + Math.abs(enemy.y - p.y);
                if (d < minDist) { minDist = d; closest = p; }
            });

            if (!closest) {
                endBattle(false);
                return;
            }

            if (minDist <= (enemy.attackRange || 1)) {
                closest.hp = Math.max(0, closest.hp - enemy.attack);
                if (closest.hp <= 0) {
                    corpses.push({ x: closest.x, y: closest.y });
                }
                battleLog.innerText = `${enemy.type} атакует!`;
                drawBattle();

                const end = checkBattleEnd();
                if (end === 'win') { setTimeout(() => endBattle(true), 200); return; }
                if (end === 'lose') { setTimeout(() => endBattle(false), 200); return; }

                setTimeout(processNextEnemy, 300);
            } else {
                let moveRange = enemy.moveRange || 3;
                let dx = 0, dy = 0;
                if (Math.random() < 0.4) {
                    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
                    const dir = dirs[Math.floor(Math.random() * 4)];
                    dx = dir[0];
                    dy = dir[1];
                } else {
                    if (enemy.x < closest.x) dx = 1;
                    else if (enemy.x > closest.x) dx = -1;
                    else if (enemy.y < closest.y) dy = 1;
                    else if (enemy.y > closest.y) dy = -1;
                }

                const newX = Math.max(0, Math.min(BATTLE_WIDTH-1, enemy.x + dx));
                const newY = Math.max(0, Math.min(BATTLE_HEIGHT-1, enemy.y + dy));
                const occupied = battleEnemyUnits.some(u => u.x === newX && u.y === newY && u.hp > 0) ||
                                 battlePlayerUnits.some(u => u.x === newX && u.y === newY && u.hp > 0) ||
                                 corpses.some(c => c.x === newX && c.y === newY);
                if (!occupied) {
                    animateJump(enemy, enemy.x, enemy.y, newX, newY, () => {
                        drawBattle();
                        const end = checkBattleEnd();
                        if (end === 'win') { setTimeout(() => endBattle(true), 200); return; }
                        if (end === 'lose') { setTimeout(() => endBattle(false), 200); return; }
                        setTimeout(processNextEnemy, 300);
                    });
                } else {
                    drawBattle();
                    setTimeout(processNextEnemy, 300);
                }
            }
        }

        processNextEnemy();
    }

    function startBattle(enemyData, isMine = false) {
        currentEnemyPos = { x: enemyData.x, y: enemyData.y };
        setupBattleUnits(enemyData.units);
        corpses = [];
        currentTurn = 'player';
        selectedUnitId = null;
        battleActive = true;
        isMineBattle = isMine;
        showBattle();
        drawBattle();
        updateTurnDisplay();
        battleLog.innerText = 'Ваш ход. Выберите юнита.';
        showUnitDetails(null);
    }

    function updateTurnDisplay() {
        if (currentTurn === 'player') {
            turnPlayerDot.className = 'turn-dot player-active';
            turnEnemyDot.className = 'turn-dot';
            turnText.innerText = 'Игрок';
        } else {
            turnPlayerDot.className = 'turn-dot';
            turnEnemyDot.className = 'turn-dot enemy-active';
            turnText.innerText = 'Враг';
        }
    }

    function fleeBattle() {
        if (!battleActive) return;
        gold = Math.max(0, gold - 50);
        updateGoldDisplay();
        battleLog.innerText = 'Вы сбежали из боя! Потеряно 50💰';
        playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
        playerHero.hp = playerHero.maxHp;
        playerWarriors.forEach(w => w.hp = w.maxHp);
        corpses = [];
        battleActive = false;
        isMineBattle = false;
        showMap();
        drawMap();
    }

    // ---------- Управление экранами ----------
    function showMenu() { menuScreen.style.display = 'flex'; mapScreen.style.display = 'none'; tavernScreen.style.display = 'none'; battleScreen.style.display = 'none'; }
    function showMap() { menuScreen.style.display = 'none'; mapScreen.style.display = 'flex'; tavernScreen.style.display = 'none'; battleScreen.style.display = 'none'; drawMap(); }
    function showTavern() { menuScreen.style.display = 'none'; mapScreen.style.display = 'none'; tavernScreen.style.display = 'flex'; battleScreen.style.display = 'none'; }
    function showBattle() { menuScreen.style.display = 'none'; mapScreen.style.display = 'none'; tavernScreen.style.display = 'none'; battleScreen.style.display = 'flex'; }

    // ---------- События ----------
    document.querySelectorAll('.class-card').forEach(card => {
        card.addEventListener('click', () => {
            const className = card.dataset.class;
            playerHero = { ...heroByClass[className], hp: heroByClass[className].maxHp };
            playerWarriors = [];
            gold = 200;
            updateGoldDisplay();
            generateWorld();
            generateEnemies();
            playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
            updateIncomeRate();
            showMap();
        });
    });

    mapCanvas.addEventListener('click', handleMapClick);
    mapCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleMapClick(e.touches[0]); });

    battleCanvas.addEventListener('click', handleBattleClick);
    battleCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleBattleClick(e.touches[0]); });

    tavernBtn.addEventListener('click', openTavern);
    closeTavernBtn.addEventListener('click', showMap);

    teleportBtn.addEventListener('click', () => {
        playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
        playerHero.hp = playerHero.maxHp;
        playerWarriors.forEach(w => w.hp = w.maxHp);
        drawMap();
    });

    menuFromMapBtn.addEventListener('click', showMenu);
    menuFromBattleBtn.addEventListener('click', showMenu);

    fleeBtn.addEventListener('click', fleeBattle);

    endTurnBtn.addEventListener('click', () => {
        if (currentTurn === 'player' && battleActive && !animationInProgress) {
            battlePlayerUnits.forEach(u => u.actedThisTurn = false);
            currentTurn = 'enemy';
            selectedUnitId = null;
            showUnitDetails(null);
            updateTurnDisplay();
            drawBattle();
            setTimeout(enemyTurn, 300);
        }
    });

    setInterval(() => {
        if (mapScreen.style.display === 'flex') {
            updateTimer();
            checkIncome();
            drawMap();
        }
    }, 1000);

    setInterval(() => {
        if (mapScreen.style.display === 'flex') {
            checkIncome();
            drawMap();
        }
    }, 60000);

    showMenu();
})();
</script>
</body>
