<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DISCIPLES: ROADS ONLY</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        #game-container {
            width: 100%;
            height: 100vh;
            max-width: 600px;
            background: #0a0a0a;
            border-left: 1px solid #ff0000;
            border-right: 1px solid #ff0000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Красные акценты */
        .red-border {
            border-color: #ff0000 !important;
        }

        .red-text {
            color: #ff0000 !important;
        }

        .red-bg {
            background: #ff0000 !important;
            color: #000000 !important;
        }

        .red-shadow {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* МЕНЮ - монохром с красным */
        .menu-screen {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 30px 20px;
            height: 100%;
            justify-content: center;
            background: #0a0a0a;
            position: relative;
        }

        .menu-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(255,0,0,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-align: center;
            color: #ffffff;
            text-shadow: 3px 3px 0 #ff0000;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sub {
            text-align: center;
            color: #888888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: -15px;
        }

        .class-cards {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
            z-index: 2;
        }

        .class-card {
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 0;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .class-card:hover {
            border-color: #ff0000;
            background: #222222;
        }

        .class-card:active {
            transform: scale(0.98);
        }

        .class-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.2), transparent);
            transition: left 0.3s ease;
        }

        .class-card:hover::after {
            left: 100%;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: #000000;
            border: 2px solid #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            filter: grayscale(100%);
        }

        .card-icon.red-icon {
            filter: grayscale(0%);
        }

        .card-info h3 {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .card-info p {
            color: #aaaaaa;
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .card-info p span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ГЛОБАЛЬНАЯ КАРТА - квадратные ячейки */
        .map-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000000;
            padding: 10px 15px;
            border-bottom: 2px solid #ff0000;
            color: #ffffff;
            font-size: 0.9rem;
        }

        .income-timer {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .income-display {
            background: #1a1a1a;
            padding: 5px 12px;
            border: 1px solid #333333;
            color: #ffffff;
            font-weight: bold;
        }

        .castle-buttons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .gold-display {
            background: #1a1a1a;
            padding: 5px 12px;
            border: 1px solid #ff0000;
            color: #ff0000;
            font-weight: bold;
        }

        .castle-btn {
            background: #1a1a1a;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 5px 10px;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .castle-btn:hover {
            border-color: #ff0000;
            color: #ff0000;
        }

        .castle-btn:active {
            transform: translateY(2px);
        }

        .map-canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            padding: 10px;
        }

        #mapCanvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            background: #0a0a0a;
            border: 2px solid #333333;
            cursor: pointer;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .map-footer {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #000000;
            border-top: 1px solid #333333;
        }

        .map-footer button {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 10px 0;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-footer button:hover {
            border-color: #ff0000;
            color: #ff0000;
        }

        .map-footer button:active {
            transform: translateY(3px);
        }

        /* ТАВЕРНА - монохром */
        .tavern-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
            padding: 15px;
        }

        .tavern-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }

        .tavern-title {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .tavern-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 3;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .tavern-item {
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tavern-item:hover {
            border-color: #ff0000;
            background: #222222;
        }

        .tavern-item:active {
            transform: scale(0.99);
        }

        .tavern-icon {
            font-size: 3rem;
            width: 60px;
            height: 60px;
            background: #000000;
            border: 2px solid #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: grayscale(100%);
        }

        .tavern-info {
            flex: 1;
        }

        .tavern-info h3 {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .tavern-info p {
            color: #aaaaaa;
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .tavern-info p span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .tavern-cost {
            font-size: 1.3rem;
            color: #ff0000;
            font-weight: bold;
        }

        .army-preview {
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 15px;
            margin-bottom: 15px;
            flex: 2;
            min-height: 120px;
            overflow-y: auto;
        }

        .army-title {
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .army-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .army-unit {
            background: #000000;
            border: 1px solid #ff0000;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .army-unit span {
            font-size: 2rem;
            filter: grayscale(100%);
        }

        .army-unit small {
            color: #aaaaaa;
            font-size: 0.6rem;
        }

        .tavern-footer {
            display: flex;
            gap: 10px;
        }

        .tavern-footer button {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 12px 0;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tavern-footer button:hover {
            border-color: #ff0000;
            color: #ff0000;
        }

        .tavern-footer button:active {
            transform: translateY(3px);
        }

        /* ЭКРАН БИТВЫ - монохром с красным */
        .battle-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }

        .battle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000000;
            padding: 8px 12px;
            border-bottom: 2px solid #ff0000;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .turn-queue {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a1a1a;
            padding: 5px 10px;
            border: 1px solid #333333;
        }

        .queue-icon {
            font-size: 1.2rem;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            border: 1px solid #ff0000;
            color: #ffffff;
            flex-shrink: 0;
            filter: grayscale(100%);
        }

        .queue-icon.next {
            border-width: 2px;
            border-color: #ff0000;
            box-shadow: 0 0 8px #ff0000;
            background: #222222;
        }

        .turn-text {
            font-weight: bold;
            color: #ff0000;
            margin-left: 5px;
        }

        .btn-menu {
            background: #1a1a1a;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 5px 12px;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-menu:hover {
            border-color: #ff0000;
            color: #ff0000;
        }

        .btn-menu:active {
            transform: translateY(2px);
        }

        .battle-canvas-wrapper {
            flex: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            padding: 5px;
        }

        #battleCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 7/11;
            background: #0a0a0a;
            border: 2px solid #333333;
            cursor: pointer;
        }

        .unit-details {
            background: #1a1a1a;
            border: 1px solid #333333;
            margin: 5px 12px;
            padding: 8px 12px;
            color: #ffffff;
            min-height: 45px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .unit-details span {
            color: #ff0000;
            font-size: 1.3rem;
            filter: grayscale(100%);
        }

        .log-message {
            background: #1a1a1a;
            border: 1px solid #333333;
            margin: 5px 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #ffffff;
            text-align: center;
            min-height: 2.5rem;
        }

        .battle-footer {
            display: flex;
            gap: 5px;
            padding: 5px 12px 10px;
            background: #000000;
            border-top: 1px solid #333333;
        }

        .battle-footer button {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 8px 0;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .battle-footer button:hover {
            border-color: #ff0000;
            color: #ff0000;
        }

        .battle-footer button:active {
            transform: translateY(3px);
        }

        .flee-btn {
            border-color: #ff0000 !important;
            color: #ff0000 !important;
        }

        .flee-btn:hover {
            background: #ff0000 !important;
            color: #000000 !important;
        }

        .hourglass-btn {
            font-size: 1rem;
        }

        /* Препятствия в бою */
        .obstacle {
            background: #2a2a2a;
            border: 2px solid #ff0000;
            position: relative;
        }

        .obstacle::after {
            content: '🪨';
            font-size: 1.5rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: grayscale(100%);
            opacity: 0.7;
        }

        /* Анимации */
        @keyframes pulse-red {
            0%, 100% { border-color: #333333; }
            50% { border-color: #ff0000; }
        }

        .pulse-red {
            animation: pulse-red 1.5s infinite;
        }

        /* Стили для Canvas */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Скроллбары */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff0000;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffffff;
        }
    </style>
</head>
<body>
<div id="game-container">
    <!-- МЕНЮ - монохром с красным -->
    <div id="menu-screen" class="menu-screen">
        <div class="title">DISCIPLES</div>
        <div class="sub">ROADS ONLY</div>
        <div class="class-cards">
            <div class="class-card" data-class="warrior">
                <div class="card-icon">⚔️</div>
                <div class="card-info">
                    <h3>WARRIOR</h3>
                    <p><span>❤️ 35</span> <span>⚔️ 7</span> <span>🦶 3</span></p>
                </div>
            </div>
            <div class="class-card" data-class="mage">
                <div class="card-icon">🔮</div>
                <div class="card-info">
                    <h3>MAGE</h3>
                    <p><span>❤️ 24</span> <span>⚡ 12</span> <span>🦶 3</span></p>
                </div>
            </div>
            <div class="class-card" data-class="archer">
                <div class="card-icon">🏹</div>
                <div class="card-info">
                    <h3>ARCHER</h3>
                    <p><span>❤️ 28</span> <span>🏹 9</span> <span>🦶 3</span></p>
                </div>
            </div>
        </div>
        <div style="text-align: center; color:#555555; font-size:0.7rem; letter-spacing:2px;">[ SELECT YOUR CLASS ]</div>
    </div>

    <!-- Глобальная карта - квадратные ячейки -->
    <div id="map-screen" class="map-screen">
        <div class="map-header">
            <div class="income-timer">
                <span class="income-display" id="incomePerMin">💰 +<span id="incomeRate">1</span>/5m</span>
                <span class="income-display" id="timerDisplay">⏳ 5:00</span>
            </div>
            <div class="castle-buttons">
                <span class="gold-display" id="goldDisplay">💰 200</span>
                <button class="castle-btn" id="tavernBtn" style="display:none;">🍺 TAVERN</button>
                <button class="castle-btn" id="teleportBtn">🏰 CASTLE</button>
            </div>
        </div>
        <div class="map-canvas-container">
            <canvas id="mapCanvas" width="600" height="600"></canvas>
        </div>
        <div class="map-footer">
            <button id="menuFromMapBtn">⚙️ MENU</button>
        </div>
    </div>

    <!-- Таверна - монохром -->
    <div id="tavern-screen" class="tavern-screen">
        <div class="tavern-header">
            <span class="tavern-title">TAVERN</span>
            <span class="gold-display" id="tavernGold">💰 200</span>
        </div>
        <div class="tavern-grid" id="tavernGrid"></div>
        <div class="army-preview">
            <div class="army-title">⚔️ YOUR ARMY (<span id="armyCount">0</span>/6)</div>
            <div class="army-grid" id="armyGrid"></div>
        </div>
        <div class="tavern-footer">
            <button id="closeTavernBtn">↩️ CLOSE</button>
        </div>
    </div>

    <!-- Экран битвы - монохром с красным -->
    <div id="battle-screen" class="battle-screen">
        <div class="battle-header">
            <div class="turn-queue" id="turnQueue"></div>
            <span class="turn-text" id="turnText">PLAYER TURN</span>
            <button class="btn-menu" id="menuFromBattleBtn">⚙️ MENU</button>
        </div>
        <div class="battle-canvas-wrapper">
            <canvas id="battleCanvas" width="700" height="1100"></canvas>
        </div>
        <div class="unit-details" id="unitDetails">[ SELECT UNIT ]</div>
        <div class="log-message" id="battleLog">YOUR TURN. CHOOSE A UNIT.</div>
        <div class="battle-footer">
            <button id="fleeBtn" class="flee-btn">🏃 FLEE (-50💰)</button>
            <button id="endTurnBtn" class="hourglass-btn">⌛ END TURN</button>
        </div>
    </div>
</div>

<script>
(function() {
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.backgroundColor = '#000000';
        tg.setHeaderColor('#000000');
    }

    // --- DOM элементы ---
    const menuScreen = document.getElementById('menu-screen');
    const mapScreen = document.getElementById('map-screen');
    const tavernScreen = document.getElementById('tavern-screen');
    const battleScreen = document.getElementById('battle-screen');
    const mapCanvas = document.getElementById('mapCanvas');
    const ctxMap = mapCanvas.getContext('2d');
    const battleCanvas = document.getElementById('battleCanvas');
    const ctxBattle = battleCanvas.getContext('2d');
    const battleLog = document.getElementById('battleLog');
    const turnText = document.getElementById('turnText');
    const tavernBtn = document.getElementById('tavernBtn');
    const teleportBtn = document.getElementById('teleportBtn');
    const menuFromMapBtn = document.getElementById('menuFromMapBtn');
    const menuFromBattleBtn = document.getElementById('menuFromBattleBtn');
    const endTurnBtn = document.getElementById('endTurnBtn');
    const fleeBtn = document.getElementById('fleeBtn');
    const goldDisplay = document.getElementById('goldDisplay');
    const tavernGold = document.getElementById('tavernGold');
    const tavernGrid = document.getElementById('tavernGrid');
    const closeTavernBtn = document.getElementById('closeTavernBtn');
    const armyGrid = document.getElementById('armyGrid');
    const armyCount = document.getElementById('armyCount');
    const unitDetails = document.getElementById('unitDetails');
    const incomeRateSpan = document.getElementById('incomeRate');
    const timerDisplay = document.getElementById('timerDisplay');
    const turnQueue = document.getElementById('turnQueue');

    // ---------- ГЛОБАЛЬНАЯ КАРТА ----------
    const MAP_SIZE = 100;
    const CAMERA_SIZE = 6;
    const CASTLE_POS = { x: Math.floor(MAP_SIZE/2), y: Math.floor(MAP_SIZE/2) };
    let worldMap = [];
    let enemiesOnMap = [];
    let mines = [];
    let lastIncomeTime = Date.now();
    const INCOME_INTERVAL = 5 * 60 * 1000;

    let gold = 200;
    function updateGoldDisplay() {
        goldDisplay.innerText = `💰 ${gold}`;
        tavernGold.innerText = `💰 ${gold}`;
    }

    function updateIncomeRate() {
        const playerMines = mines.filter(m => m.owner === 'player').length;
        const totalRate = 1 + playerMines;
        incomeRateSpan.innerText = totalRate;
    }

    function updateTimer() {
        const now = Date.now();
        const timeLeft = Math.max(0, INCOME_INTERVAL - (now - lastIncomeTime));
        const minutes = Math.floor(timeLeft / 60000);
        const seconds = Math.floor((timeLeft % 60000) / 1000);
        timerDisplay.innerText = `⏳ ${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function generateWorld() {
        worldMap = [];
        for (let y = 0; y < MAP_SIZE; y++) {
            let row = [];
            for (let x = 0; x < MAP_SIZE; x++) {
                const nx = x / MAP_SIZE - 0.5;
                const ny = y / MAP_SIZE - 0.5;
                const distance = Math.sqrt(nx*nx + ny*ny);
                
                let r = Math.random() * (1 + distance * 2);
                
                if (r < 0.5) row.push(1); // лес
                else if (r < 0.8) row.push(3); // трава
                else if (r < 0.95) row.push(2); // вода
                else row.push(0); // дорога
            }
            worldMap.push(row);
        }

        const roads = new Set();
        roads.add(`${CASTLE_POS.x},${CASTLE_POS.y}`);
        const directions = [[1,0],[-1,0],[0,1],[0,-1]];
        
        let mainDirs = [];
        for (let i = 0; i < 3; i++) {
            let dir;
            do {
                dir = directions[Math.floor(Math.random() * 4)];
            } while (mainDirs.some(d => d[0] === dir[0] && d[1] === dir[1]));
            mainDirs.push(dir);
        }

        mainDirs.forEach(dir => {
            let x = CASTLE_POS.x;
            let y = CASTLE_POS.y;
            let length = 50 + Math.floor(Math.random() * 30);
            for (let step = 0; step < length; step++) {
                x = Math.max(0, Math.min(MAP_SIZE-1, x + dir[0]));
                y = Math.max(0, Math.min(MAP_SIZE-1, y + dir[1]));
                roads.add(`${x},${y}`);
                if (step % 7 === 0) {
                    let bx = x, by = y;
                    for (let b = 0; b < 10; b++) {
                        const bdir = directions[Math.floor(Math.random() * 4)];
                        bx = Math.max(0, Math.min(MAP_SIZE-1, bx + bdir[0]));
                        by = Math.max(0, Math.min(MAP_SIZE-1, by + bdir[1]));
                        roads.add(`${bx},${by}`);
                    }
                }
            }
        });

        for (let i = 0; i < 60; i++) {
            let x = CASTLE_POS.x + Math.floor(Math.random() * 60 - 30);
            let y = CASTLE_POS.y + Math.floor(Math.random() * 60 - 30);
            x = Math.max(0, Math.min(MAP_SIZE-1, x));
            y = Math.max(0, Math.min(MAP_SIZE-1, y));
            for (let step = 0; step < 20; step++) {
                const dir = directions[Math.floor(Math.random() * 4)];
                x = Math.max(0, Math.min(MAP_SIZE-1, x + dir[0]));
                y = Math.max(0, Math.min(MAP_SIZE-1, y + dir[1]));
                roads.add(`${x},${y}`);
            }
        }

        roads.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            worldMap[y][x] = 0;
        });

        mines = [];
        for (let i = 0; i < 20; i++) {
            let x = Math.floor(Math.random() * MAP_SIZE);
            let y = Math.floor(Math.random() * MAP_SIZE);
            if (worldMap[y][x] === 0 && !(x === CASTLE_POS.x && y === CASTLE_POS.y)) {
                mines.push({ x, y, owner: null });
            }
        }
    }

    function generateEnemies() {

            { type: 'DEATH KNIGHT', hp: 24, maxHp: 24, attack: 7, icon: '⚔️', moveRange: 3, attackRange: 1 },
            { type: 'GOBLIN', hp: 14, maxHp: 14, attack: 4, icon: '👺', moveRange: 4, attackRange: 1 },
            { type: 'ORC', hp: 22, maxHp: 22, attack: 6, icon: '👹', moveRange: 3, attackRange: 1 },
            { type: 'WOLF', hp: 12, maxHp: 12, attack: 8, icon: '🐺', moveRange: 5, attackRange: 1 },
            { type: 'DRAGON', hp: 40, maxHp: 40, attack: 15, icon: '🐉', moveRange: 2, attackRange: 2 },
            { type: 'BOAR', hp: 20, maxHp: 20, attack: 7, icon: '🐗', moveRange: 3, attackRange: 1 },

        ];

        for (let i = 0; i < 80; i++) {

                        units.push({ ...tmpl, hp: tmpl.maxHp, team: 'enemy' });
                    }
                    enemiesOnMap.push({ x, y, units });
                    break;
                }
                attempts++;
            }
        }
    }

    function checkIncome() {
        const now = Date.now();
        if (now - lastIncomeTime >= INCOME_INTERVAL) {
            const intervals = Math.floor((now - lastIncomeTime) / INCOME_INTERVAL);
            if (intervals > 0) {
                let income = intervals * 1;
                const playerMines = mines.filter(m => m.owner === 'player').length;
                income += intervals * playerMines;
                gold += income;
                updateGoldDisplay();
                lastIncomeTime += intervals * INCOME_INTERVAL;
                battleLog.innerText = `INCOME: +${income}💰`;
                updateIncomeRate();
            }
        }
    }

    // Монохромный дизайн карты с квадратными ячейками
    function drawMap() {
        checkIncome();
        updateTimer();
        ctxMap.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
        const cellSize = mapCanvas.width / CAMERA_SIZE;
        let startX = playerPos.x - Math.floor(CAMERA_SIZE/2);
        let startY = playerPos.y - Math.floor(CAMERA_SIZE/2);

        tavernBtn.style.display = (playerPos.x === CASTLE_POS.x && playerPos.y === CASTLE_POS.y) ? 'inline-block' : 'none';

        for (let i = 0; i < CAMERA_SIZE; i++) {
            for (let j = 0; j < CAMERA_SIZE; j++) {
                const worldX = startX + j;
                const worldY = startY + i;
                const cellType = worldMap[worldY][worldX];
                const x = j * cellSize;
                const y = i * cellSize;

                // Монохромные цвета для фона
                if (cellType === 0) { // дорога
                    ctxMap.fillStyle = '#333333';
                } else if (cellType === 1) { // лес
                    ctxMap.fillStyle = '#222222';
                } else if (cellType === 2) { // вода
                    ctxMap.fillStyle = '#111111';
                } else { // трава
                    ctxMap.fillStyle = '#2a2a2a';
                }
                
                ctxMap.fillRect(x, y, cellSize, cellSize);
                
                // Квадратная сетка
                ctxMap.strokeStyle = '#444444';
                ctxMap.lineWidth = 1;
                ctxMap.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);

                // Эмодзи (все черно-белые через оттенки серого)
                ctxMap.font = `${cellSize-35}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
                ctxMap.textAlign = 'center';
                ctxMap.textBaseline = 'middle';

                // Рисуем эмодзи в оттенках серого
                ctxMap.fillStyle = '#aaaaaa';

                if (cellType === 1) {
                    ctxMap.fillText('🌲', x + cellSize/2, y + cellSize/2);
                } else if (cellType === 2) {
                    ctxMap.fillText('💧', x + cellSize/2, y + cellSize/2);
                } else if (cellType === 3) {
                    ctxMap.fillText('🌿', x + cellSize/2, y + cellSize/2);
                }

                const mineHere = mines.find(m => m.x === worldX && m.y === worldY);
                if (mineHere) {
                    if (mineHere.owner === 'player') {
                        ctxMap.fillStyle = '#ff0000'; // Красный для захваченных шахт
                        ctxMap.fillText('⛏️', x + cellSize/2 - 8, y + cellSize/2 - 5);
                        ctxMap.fillText('✔️', x + cellSize/2 + 8, y + cellSize/2 + 3);
                    } else {
                        ctxMap.fillStyle = '#888888';
                        ctxMap.fillText('⛏️', x + cellSize/2, y + cellSize/2);
                    }
                }

                if (worldX === CASTLE_POS.x && worldY === CASTLE_POS.y) {
                    ctxMap.fillStyle = '#ff0000'; // Красный для замка
                    ctxMap.fillText('🏰', x + cellSize/2, y + cellSize/2);
                }
                
                const enemyHere = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
                if (enemyHere) {
                    ctxMap.fillStyle = '#ff0000'; // Красный для врагов
                    // Используем иконку из первого юнита в отряде
                    const enemyIcon = enemyHere.units[0]?.icon || '⚔️';
                    ctxMap.fillText(enemyIcon, x + cellSize/2, y + cellSize/2);
                }
                
                if (playerPos.x === worldX && playerPos.y === worldY) {
                    ctxMap.fillStyle = '#ffffff'; // Белый для игрока
                    ctxMap.fillText(playerHero.icon, x + cellSize/2, y + cellSize/2);
                }
            }
        }
    }

    // Функция для проверки, можно ли переместиться на клетку (только по дорогам)
    function canMoveTo(worldX, worldY) {
        if (worldX < 0 || worldX >= MAP_SIZE || worldY < 0 || worldY >= MAP_SIZE) return false;
        
        // Проверяем тип клетки: можно ходить ТОЛЬКО по дорогам (0)
        if (worldMap[worldY][worldX] !== 0) return false;
        
        // Проверяем, нет ли врага на клетке
        const enemyHere = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
        if (enemyHere) return false;
        
        return true;
    }

    function handleMapClick(e) {
        const rect = mapCanvas.getBoundingClientRect();
        const scale = mapCanvas.width / rect.width;
        const mouseX = (e.clientX - rect.left) * scale;
        const mouseY = (e.clientY - rect.top) * scale;
        const cellSize = mapCanvas.width / CAMERA_SIZE;
        const col = Math.floor(mouseX / cellSize);
        const row = Math.floor(mouseY / cellSize);
        if (col < 0 || col >= CAMERA_SIZE || row < 0 || row >= CAMERA_SIZE) return;

        let startX = playerPos.x - Math.floor(CAMERA_SIZE/2);
        let startY = playerPos.y - Math.floor(CAMERA_SIZE/2);
        startX = Math.max(0, Math.min(MAP_SIZE - CAMERA_SIZE, startX));
        startY = Math.max(0, Math.min(MAP_SIZE - CAMERA_SIZE, startY));
        const worldX = startX + col;
        const worldY = startY + row;

        // Проверяем, что клетка соседняя (манхэттенское расстояние 1)
        if (Math.abs(worldX - playerPos.x) + Math.abs(worldY - playerPos.y) !== 1) {
            battleLog.innerText = 'YOU CAN ONLY MOVE TO ADJACENT CELLS!';
            return;
        }

        // Проверяем, можно ли переместиться (только по дорогам)
        if (!canMoveTo(worldX, worldY)) {
            battleLog.innerText = 'YOU CAN ONLY MOVE ON ROADS!';
            return;
        }

        // Перемещаем игрока
        playerPos = { x: worldX, y: worldY };
        drawMap();

        // Проверяем шахты
        const mineHere = mines.find(m => m.x === worldX && m.y === worldY);
        if (mineHere && mineHere.owner !== 'player') {
            const mineGuard = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
            if (mineGuard) {
                startBattle(mineGuard, true);
            } else {
                mineHere.owner = 'player';
                updateIncomeRate();
                battleLog.innerText = 'MINE CAPTURED! +1💰/5min';
                drawMap();
            }
        } else {
            const enemyHere = enemiesOnMap.find(e => e.x === worldX && e.y === worldY);
            if (enemyHere) startBattle(enemyHere, false);
        }
    }

    // ---------- ТАКТИЧЕСКИЙ БОЙ ----------
    const BATTLE_WIDTH = 7;
    const BATTLE_HEIGHT = 11;
    let battlePlayerUnits = [];
    let battleEnemyUnits = [];
    let obstacles = [];
    let corpses = [];
    let currentTurn = 'player';
    let selectedUnitId = null;
    let battleActive = false;
    let currentEnemyPos = null;
    let nextId = 1000;
    let isMineBattle = false;
    let animationInProgress = false;
    let turnOrder = [];

    function generateObstacles() {
        obstacles = [];
        const count = 5 + Math.floor(Math.random() * 8);
        for (let i = 0; i < count; i++) {
            const x = Math.floor(Math.random() * BATTLE_WIDTH);
            const y = Math.floor(Math.random() * BATTLE_HEIGHT);
            const isPlayerStart = (y >= 6) && (x <= 1);
            const isEnemyStart = (y < 5) && (x >= 5);
            if (!isPlayerStart && !isEnemyStart) {
                obstacles.push({ x, y });
            }
        }
    }

    function isObstacle(x, y) {
        return obstacles.some(o => o.x === x && o.y === y);
    }

    function isCellOccupied(x, y, excludeUnitId = null) {
        const player = battlePlayerUnits.find(u => u.x === x && u.y === y && u.hp > 0 && u.id !== excludeUnitId);
        const enemy = battleEnemyUnits.find(u => u.x === x && u.y === y && u.hp > 0 && u.id !== excludeUnitId);
        return !!(player || enemy);
    }

    function canMoveBetween(x1, y1, x2, y2) {
        if (x1 === x2 && y1 === y2) return true;
        
        const dx = x2 - x1;
        const dy = y2 - y1;
        
        if (Math.abs(dx) + Math.abs(dy) > 1) return false;
        
        const nx = x1 + Math.sign(dx);
        const ny = y1 + Math.sign(dy);
        
        if (isObstacle(nx, ny)) return false;
        if (isCellOccupied(nx, ny)) return false;
        
        return true;
    }

    function moveUnitStep(unit, targetX, targetY, stepsLeft, callback) {
        if (stepsLeft <= 0 || (unit.x === targetX && unit.y === targetY)) {
            callback(true);
            return;
        }
        
        const dx = Math.sign(targetX - unit.x);
        const dy = Math.sign(targetY - unit.y);
        
        if (dx !== 0) {
            const newX = unit.x + dx;
            const newY = unit.y;
            if (canMoveBetween(unit.x, unit.y, newX, newY)) {
                animateJump(unit, unit.x, unit.y, newX, newY, () => {
                    moveUnitStep(unit, targetX, targetY, stepsLeft - 1, callback);
                });
                return;
            }
        }
        
        if (dy !== 0) {
            const newX = unit.x;
            const newY = unit.y + dy;
            if (canMoveBetween(unit.x, unit.y, newX, newY)) {
                animateJump(unit, unit.x, unit.y, newX, newY, () => {
                    moveUnitStep(unit, targetX, targetY, stepsLeft - 1, callback);
                });
                return;
            }
        }
        
        callback(false);
    }

    function updateTurnQueue() {
        const allAlive = [...battlePlayerUnits.filter(u => u.hp > 0), ...battleEnemyUnits.filter(u => u.hp > 0)];
        
        if (turnOrder.length === 0) {
            turnOrder = allAlive.map(u => u.id);
            turnOrder.sort((a, b) => {
                const uA = allAlive.find(u => u.id === a);
                const uB = allAlive.find(u => u.id === b);
                return uA.y - uB.y;
            });
        } else {
            turnOrder = turnOrder.filter(id => allAlive.some(u => u.id === id));
        }

        turnQueue.innerHTML = '';
        turnOrder.slice(0, 6).forEach((id, index) => {
            const unit = allAlive.find(u => u.id === id);
            if (!unit) return;
            const icon = document.createElement('span');
            icon.className = 'queue-icon';
            icon.textContent = unit.icon;
            if (unit.team === 'player') {
                icon.style.borderColor = '#ffffff';
            } else {
                icon.style.borderColor = '#ff0000';
            }
            if (index === 0) {
                icon.classList.add('next');
            }
            if (unit.id === selectedUnitId) {
                icon.style.boxShadow = '0 0 10px #ff0000';
            }
            turnQueue.appendChild(icon);
        });

        turnText.innerText = currentTurn === 'player' ? 'PLAYER TURN' : 'ENEMY TURN';
    }

    function moveToEndOfQueue(unitId) {
        const index = turnOrder.indexOf(unitId);
        if (index !== -1) {
            turnOrder.splice(index, 1);
            turnOrder.push(unitId);
        }
        updateTurnQueue();
    }

    function setupBattleUnits(enemyUnitsData) {
        battlePlayerUnits = [];
        battleEnemyUnits = [];
        generateObstacles();

        const allPlayer = [playerHero, ...playerWarriors].filter(u => u.hp > 0);
        
        let playerPositions = [];
        for (let y = 6; y < BATTLE_HEIGHT; y++) {
            for (let x = 0; x <= 1; x++) {
                playerPositions.push({ x, y });
            }
        }
        playerPositions = playerPositions.sort(() => Math.random() - 0.5);
        for (let i = 0; i < Math.min(allPlayer.length, playerPositions.length); i++) {
            const pos = playerPositions[i];
            battlePlayerUnits.push({
                ...allPlayer[i],
                id: nextId++,
                x: pos.x,
                y: pos.y,
                actedThisTurn: false
            });
        }

        let enemyPositions = [];
        for (let y = 0; y < 5; y++) {
            for (let x = 5; x <= 6; x++) {
                enemyPositions.push({ x, y });
            }
        }
        enemyPositions = enemyPositions.sort(() => Math.random() - 0.5);
        for (let i = 0; i < Math.min(enemyUnitsData.length, enemyPositions.length); i++) {
            const pos = enemyPositions[i];
            battleEnemyUnits.push({
                ...enemyUnitsData[i],
                id: nextId++,
                x: pos.x,
                y: pos.y,
                actedThisTurn: false
            });
        }
        turnOrder = [];
        updateTurnQueue();
    }

    function drawBattle() {
        ctxBattle.clearRect(0, 0, battleCanvas.width, battleCanvas.height);
        const cellSize = battleCanvas.width / BATTLE_WIDTH;

        for (let y = 0; y < BATTLE_HEIGHT; y++) {
            for (let x = 0; x < BATTLE_WIDTH; x++) {
                const xPos = x * cellSize;
                const yPos = y * cellSize;
                
                if (isObstacle(x, y)) {
                    ctxBattle.fillStyle = '#2a2a2a';
                    ctxBattle.fillRect(xPos, yPos, cellSize, cellSize);
                    
                    ctxBattle.strokeStyle = '#ff0000';
                    ctxBattle.lineWidth = 2;
                    ctxBattle.strokeRect(xPos+2, yPos+2, cellSize-4, cellSize-4);
                    
                    ctxBattle.font = `${cellSize-40}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
                    ctxBattle.fillStyle = '#666666';
                    ctxBattle.fillText('🪨', xPos + cellSize/2, yPos + cellSize/2);
                } else {
                    ctxBattle.fillStyle = '#1a1a1a';
                    ctxBattle.fillRect(xPos, yPos, cellSize, cellSize);
                    
                    ctxBattle.strokeStyle = '#333333';
                    ctxBattle.lineWidth = 1;
                    ctxBattle.strokeRect(xPos, yPos, cellSize, cellSize);
                }
            }
        }

        if (selectedUnitId && currentTurn === 'player' && !animationInProgress) {
            const selected = battlePlayerUnits.find(u => u.id === selectedUnitId);
            if (selected && selected.hp > 0 && !selected.actedThisTurn) {
                const moveRange = selected.moveRange || 3;
                const attackRange = selected.attackRange || 1;
                
                for (let dy = -moveRange; dy <= moveRange; dy++) {
                    for (let dx = -moveRange; dx <= moveRange; dx++) {
                        if (Math.abs(dx) + Math.abs(dy) > moveRange) continue;
                        const nx = selected.x + dx;
                        const ny = selected.y + dy;
                        if (nx < 0 || nx >= BATTLE_WIDTH || ny < 0 || ny >= BATTLE_HEIGHT) continue;
                        if (isObstacle(nx, ny)) continue;
                        if (isCellOccupied(nx, ny, selected.id)) continue;
                        
                        ctxBattle.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctxBattle.fillRect(nx * cellSize, ny * cellSize, cellSize, cellSize);
                    }
                }
                
                for (let dy = -attackRange; dy <= attackRange; dy++) {
                    for (let dx = -attackRange; dx <= attackRange; dx++) {
                        if (Math.abs(dx) + Math.abs(dy) > attackRange) continue;
                        const nx = selected.x + dx;
                        const ny = selected.y + dy;
                        if (nx < 0 || nx >= BATTLE_WIDTH || ny < 0 || ny >= BATTLE_HEIGHT) continue;
                        if (isObstacle(nx, ny)) continue;
                        const enemy = battleEnemyUnits.find(u => u.x === nx && u.y === ny && u.hp > 0);
                        if (enemy) {
                            ctxBattle.fillStyle = 'rgba(255, 0, 0, 0.3)';
                            ctxBattle.fillRect(nx * cellSize, ny * cellSize, cellSize, cellSize);
                        }
                    }
                }
            }
        }

        ctxBattle.font = `${cellSize-56}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.textAlign = 'center';
        ctxBattle.textBaseline = 'middle';
        
        corpses.forEach(corpse => {
            const x = corpse.x * cellSize;
            const y = corpse.y * cellSize;
            ctxBattle.fillStyle = 'rgba(255,255,255,0.3)';
            ctxBattle.fillText('💀', x + cellSize/2, y + cellSize/2);
        });

        battlePlayerUnits.forEach(u => drawUnitStatic(u, true, cellSize));
        battleEnemyUnits.forEach(u => drawUnitStatic(u, false, cellSize));
        updateTurnQueue();
    }

    function drawUnitStatic(unit, isPlayer, cellSize) {
        if (unit.hp <= 0) return;
        const x = unit.x * cellSize;
        const y = unit.y * cellSize;
        
        ctxBattle.beginPath();
        ctxBattle.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 10, 0, 2 * Math.PI);
        ctxBattle.strokeStyle = isPlayer ? '#ffffff' : '#ff0000';
        ctxBattle.lineWidth = 3;
        ctxBattle.stroke();
        
        if (unit.id === selectedUnitId && currentTurn === 'player' && isPlayer) {
            ctxBattle.beginPath();
            ctxBattle.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 8, 0, 2 * Math.PI);
            ctxBattle.strokeStyle = '#ff0000';
            ctxBattle.lineWidth = 2;
            ctxBattle.stroke();
        }
        
        ctxBattle.font = `${cellSize-56}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.fillStyle = isPlayer ? '#ffffff' : '#ff0000';
        ctxBattle.fillText(unit.icon, x + cellSize/2, y + cellSize/2);

        const barWidth = 35;
        const barHeight = 4;
        const barX = x + (cellSize - barWidth) / 2;
        const barY = y + cellSize/2 + 18;
        const hpPercent = unit.hp / unit.maxHp;

        ctxBattle.fillStyle = '#333333';
        ctxBattle.fillRect(barX, barY, barWidth, barHeight);

        ctxBattle.fillStyle = isPlayer ? '#ffffff' : '#ff0000';
        ctxBattle.fillRect(barX, barY, barWidth * hpPercent, barHeight);
    }

    function animateJump(unit, fromX, fromY, toX, toY, callback) {
        if (animationInProgress) {
            if (callback) callback();
            return;
        }
        animationInProgress = true;
        const startTime = performance.now();
        const duration = 250;

        function animate(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const jumpHeight = Math.sin(progress * Math.PI) * 30;

            drawBattleWithAnimation(unit, fromX, fromY, toX, toY, progress, jumpHeight);

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                unit.x = toX;
                unit.y = toY;
                animationInProgress = false;
                drawBattle();
                if (callback) callback();
            }
        }
        requestAnimationFrame(animate);
    }

    function drawBattleWithAnimation(movingUnit, fromX, fromY, toX, toY, progress, jumpHeight) {
        ctxBattle.clearRect(0, 0, battleCanvas.width, battleCanvas.height);
        const cellSize = battleCanvas.width / BATTLE_WIDTH;

        for (let y = 0; y < BATTLE_HEIGHT; y++) {
            for (let x = 0; x < BATTLE_WIDTH; x++) {
                const xPos = x * cellSize;
                const yPos = y * cellSize;
                
                if (isObstacle(x, y)) {
                    ctxBattle.fillStyle = '#2a2a2a';
                    ctxBattle.fillRect(xPos, yPos, cellSize, cellSize);
                    ctxBattle.strokeStyle = '#ff0000';
                    ctxBattle.lineWidth = 2;
                    ctxBattle.strokeRect(xPos+2, yPos+2, cellSize-4, cellSize-4);
                    ctxBattle.font = `${cellSize-40}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
                    ctxBattle.fillStyle = '#666666';
                    ctxBattle.fillText('🪨', xPos + cellSize/2, yPos + cellSize/2);
                } else {
                    ctxBattle.fillStyle = '#1a1a1a';
                    ctxBattle.fillRect(xPos, yPos, cellSize, cellSize);
                    ctxBattle.strokeStyle = '#333333';
                    ctxBattle.lineWidth = 1;
                    ctxBattle.strokeRect(xPos, yPos, cellSize, cellSize);
                }
            }
        }

        ctxBattle.font = `${cellSize-56}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        corpses.forEach(corpse => {
            const x = corpse.x * cellSize;
            const y = corpse.y * cellSize;
            ctxBattle.fillStyle = 'rgba(255,255,255,0.3)';
            ctxBattle.fillText('💀', x + cellSize/2, y + cellSize/2);
        });

        battlePlayerUnits.forEach(u => {
            if (u.id === movingUnit.id || u.hp <= 0) return;
            drawUnitStatic(u, true, cellSize);
        });
        battleEnemyUnits.forEach(u => {
            if (u.id === movingUnit.id || u.hp <= 0) return;
            drawUnitStatic(u, false, cellSize);
        });

        const x = (fromX + (toX - fromX) * progress) * cellSize;
        const y = (fromY + (toY - fromY) * progress) * cellSize - jumpHeight;
        
        ctxBattle.beginPath();
        ctxBattle.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 10, 0, 2 * Math.PI);
        ctxBattle.strokeStyle = movingUnit.team === 'player' ? '#ffffff' : '#ff0000';
        ctxBattle.lineWidth = 3;
        ctxBattle.stroke();
        
        ctxBattle.font = `${cellSize-56}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
        ctxBattle.fillStyle = movingUnit.team === 'player' ? '#ffffff' : '#ff0000';
        ctxBattle.fillText(movingUnit.icon, x + cellSize/2, y + cellSize/2);

        const barWidth = 35;
        const barHeight = 4;
        const barX = x + (cellSize - barWidth) / 2;
        const barY = y + cellSize/2 + 18;
        const hpPercent = movingUnit.hp / movingUnit.maxHp;

        ctxBattle.fillStyle = '#333333';
        ctxBattle.fillRect(barX, barY, barWidth, barHeight);

        ctxBattle.fillStyle = movingUnit.team === 'player' ? '#ffffff' : '#ff0000';
        ctxBattle.fillRect(barX, barY, barWidth * hpPercent, barHeight);
    }

    function checkBattleEnd() {
        const playerAlive = battlePlayerUnits.some(u => u.hp > 0);
        const enemyAlive = battleEnemyUnits.some(u => u.hp > 0);
        if (!playerAlive) return 'lose';
        if (!enemyAlive) return 'win';
        return 'ongoing';
    }

    function endBattle(win) {
        if (win) {
            if (isMineBattle) {
                const mine = mines.find(m => m.x === currentEnemyPos.x && m.y === currentEnemyPos.y);
                if (mine) mine.owner = 'player';
                updateIncomeRate();
            }
            enemiesOnMap = enemiesOnMap.filter(e => !(e.x === currentEnemyPos.x && e.y === currentEnemyPos.y));
            playerHero = battlePlayerUnits.find(u => u.type.includes('HERO') || u.type.includes('WARRIOR') || u.type.includes('MAGE') || u.type.includes('ARCHER')) || playerHero;
            playerWarriors = battlePlayerUnits.filter(u => !u.type.includes('HERO') && !u.type.includes('WARRIOR') && !u.type.includes('MAGE') && !u.type.includes('ARCHER'));
        } else {
            playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
            playerHero.hp = playerHero.maxHp;
            playerWarriors.forEach(w => w.hp = w.maxHp);
        }
        corpses = [];
        isMineBattle = false;
        turnOrder = [];
        showMap();
        drawMap();
    }

    function showUnitDetails(unit) {
        if (!unit) {
            unitDetails.innerHTML = '[ SELECT UNIT ]';
            return;
        }
        unitDetails.innerHTML = `
            <span>${unit.icon}</span>
            <div><strong>${unit.type}</strong> | ❤️ ${unit.hp}/${unit.maxHp} | ⚔️ ${unit.attack} | 🦶 ${unit.moveRange} | 🏹 ${unit.attackRange}</div>
        `;
    }

    function handleBattleClick(e) {
        if (!battleActive || animationInProgress) return;
        
        const rect = battleCanvas.getBoundingClientRect();
        const scaleX = battleCanvas.width / rect.width;
        const scaleY = battleCanvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        const cellSize = battleCanvas.width / BATTLE_WIDTH;
        const gridX = Math.floor(mouseX / cellSize);
        const gridY = Math.floor(mouseY / cellSize);
        if (gridX < 0 || gridX >= BATTLE_WIDTH || gridY < 0 || gridY >= BATTLE_HEIGHT) return;

        if (isObstacle(gridX, gridY)) {
            battleLog.innerText = 'OBSTACLE!';
            return;
        }

        const clickedPlayer = battlePlayerUnits.find(u => u.x === gridX && u.y === gridY && u.hp > 0);
        const clickedEnemy = battleEnemyUnits.find(u => u.x === gridX && u.y === gridY && u.hp > 0);

        if (clickedPlayer) {
            showUnitDetails(clickedPlayer);
            if (currentTurn === 'player') {
                selectedUnitId = clickedPlayer.id;
                drawBattle();
                battleLog.innerText = `SELECTED: ${clickedPlayer.type}`;
            }
            return;
        }
        
        if (clickedEnemy) {
            showUnitDetails(clickedEnemy);
            if (currentTurn === 'player' && selectedUnitId) {
                const unit = battlePlayerUnits.find(u => u.id === selectedUnitId);
                if (unit && unit.hp > 0 && !unit.actedThisTurn) {
                    const dist = Math.abs(unit.x - gridX) + Math.abs(unit.y - gridY);
                    if (dist <= (unit.attackRange || 1)) {
                        clickedEnemy.hp = Math.max(0, clickedEnemy.hp - unit.attack);
                        if (clickedEnemy.hp <= 0) {
                            corpses.push({ x: clickedEnemy.x, y: clickedEnemy.y });
                        }
                        battleLog.innerText = `${unit.type} ATTACKS ${clickedEnemy.type}!`;
                        unit.actedThisTurn = true;
                        selectedUnitId = null;
                        showUnitDetails(null);
                        drawBattle();
                        
                        moveToEndOfQueue(unit.id);
                        
                        const end = checkBattleEnd();
                        if (end === 'win') setTimeout(() => endBattle(true), 200);
                        else if (end === 'lose') setTimeout(() => endBattle(false), 200);
                    } else {
                        battleLog.innerText = 'TOO FAR!';
                    }
                } else {
                    selectedUnitId = null;
                    drawBattle();
                }
            }
            return;
        }

        if (currentTurn === 'player' && selectedUnitId && !animationInProgress) {
            const unit = battlePlayerUnits.find(u => u.id === selectedUnitId);
            if (!unit || unit.hp <= 0 || unit.actedThisTurn) {
                selectedUnitId = null;
                drawBattle();
                return;
            }

            const dist = Math.abs(unit.x - gridX) + Math.abs(unit.y - gridY);
            if (dist > (unit.moveRange || 3)) {
                battleLog.innerText = 'TOO FAR!';
                return;
            }

            moveUnitStep(unit, gridX, gridY, unit.moveRange || 3, (success) => {
                if (success) {
                    unit.actedThisTurn = true;
                    selectedUnitId = null;
                    showUnitDetails(null);
                    battleLog.innerText = `${unit.type} MOVED`;
                    drawBattle();
                    moveToEndOfQueue(unit.id);
                } else {
                    battleLog.innerText = 'PATH BLOCKED!';
                    drawBattle();
                }
            });
        } else if (currentTurn === 'player') {
            battleLog.innerText = 'SELECT YOUR UNIT';
        }
    }

    function enemyTurn() {
        if (!battleActive || currentTurn !== 'enemy' || animationInProgress) return;

        const enemies = battleEnemyUnits.filter(u => u.hp > 0);
        let index = 0;

        function processNextEnemy() {
            if (!battleActive) return;
            if (index >= enemies.length) {
                battlePlayerUnits.forEach(u => u.actedThisTurn = false);
                currentTurn = 'player';
                selectedUnitId = null;
                showUnitDetails(null);
                updateTurnQueue();
                drawBattle();
                battleLog.innerText = 'YOUR TURN. CHOOSE A UNIT.';
                return;
            }

            const enemy = enemies[index];
            index++;

            const players = battlePlayerUnits.filter(u => u.hp > 0);
            if (players.length === 0) {
                endBattle(false);
                return;
            }

            let bestTarget = null;
            let bestScore = -Infinity;
            players.forEach(p => {
                const threat = p.attack * (p.hp / p.maxHp);
                if (threat > bestScore) {
                    bestScore = threat;
                    bestTarget = p;
                }
            });

            if (!bestTarget) {
                endBattle(false);
                return;
            }

            const dist = Math.abs(enemy.x - bestTarget.x) + Math.abs(enemy.y - bestTarget.y);
            
            if (dist <= (enemy.attackRange || 1)) {
                bestTarget.hp = Math.max(0, bestTarget.hp - enemy.attack);
                if (bestTarget.hp <= 0) {
                    corpses.push({ x: bestTarget.x, y: bestTarget.y });
                }
                battleLog.innerText = `${enemy.type} ATTACKS!`;
                drawBattle();

                const end = checkBattleEnd();
                if (end === 'win') { setTimeout(() => endBattle(true), 200); return; }
                if (end === 'lose') { setTimeout(() => endBattle(false), 200); return; }

                moveToEndOfQueue(enemy.id);
                setTimeout(processNextEnemy, 300);
            } else {
                const dx = Math.sign(bestTarget.x - enemy.x);
                const dy = Math.sign(bestTarget.y - enemy.y);
                
                let targetX = enemy.x;
                let targetY = enemy.y;
                
                if (dx !== 0 && canMoveBetween(enemy.x, enemy.y, enemy.x + dx, enemy.y)) {
                    targetX = enemy.x + dx;
                } else if (dy !== 0 && canMoveBetween(enemy.x, enemy.y, enemy.x, enemy.y + dy)) {
                    targetY = enemy.y + dy;
                } else {
                    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
                    for (let dir of dirs) {
                        const nx = enemy.x + dir[0];
                        const ny = enemy.y + dir[1];
                        if (nx >= 0 && nx < BATTLE_WIDTH && ny >= 0 && ny < BATTLE_HEIGHT &&
                            !isObstacle(nx, ny) && !isCellOccupied(nx, ny, enemy.id)) {
                            targetX = nx;
                            targetY = ny;
                            break;
                        }
                    }
                }
                
                if (targetX !== enemy.x || targetY !== enemy.y) {
                    animateJump(enemy, enemy.x, enemy.y, targetX, targetY, () => {
                        drawBattle();
                        const end = checkBattleEnd();
                        if (end === 'win') { setTimeout(() => endBattle(true), 200); return; }
                        if (end === 'lose') { setTimeout(() => endBattle(false), 200); return; }
                        
                        moveToEndOfQueue(enemy.id);
                        setTimeout(processNextEnemy, 300);
                    });
                } else {
                    moveToEndOfQueue(enemy.id);
                    setTimeout(processNextEnemy, 300);
                }
            }
        }

        processNextEnemy();
    }

    function startBattle(enemyData, isMine = false) {
        currentEnemyPos = { x: enemyData.x, y: enemyData.y };
        setupBattleUnits(enemyData.units);
        corpses = [];
        currentTurn = 'player';
        selectedUnitId = null;
        battleActive = true;
        isMineBattle = isMine;
        showBattle();
        drawBattle();
        battleLog.innerText = 'YOUR TURN. CHOOSE A UNIT.';
        showUnitDetails(null);
    }

    function fleeBattle() {
        if (!battleActive) return;
        gold = Math.max(0, gold - 50);
        updateGoldDisplay();
        battleLog.innerText = 'FLEE! LOST 50💰';
        playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
        playerHero.hp = playerHero.maxHp;
        playerWarriors.forEach(w => w.hp = w.maxHp);
        corpses = [];
        battleActive = false;
        isMineBattle = false;
        turnOrder = [];
        showMap();
        drawMap();
    }

    // ---------- Управление экранами ----------
    function showMenu() { menuScreen.style.display = 'flex'; mapScreen.style.display = 'none'; tavernScreen.style.display = 'none'; battleScreen.style.display = 'none'; }
    function showMap() { menuScreen.style.display = 'none'; mapScreen.style.display = 'flex'; tavernScreen.style.display = 'none'; battleScreen.style.display = 'none'; drawMap(); }
    function showTavern() { menuScreen.style.display = 'none'; mapScreen.style.display = 'none'; tavernScreen.style.display = 'flex'; battleScreen.style.display = 'none'; }
    function showBattle() { menuScreen.style.display = 'none'; mapScreen.style.display = 'none'; tavernScreen.style.display = 'none'; battleScreen.style.display = 'flex'; }

    // ---------- События ----------
    document.querySelectorAll('.class-card').forEach(card => {
        card.addEventListener('click', () => {
            const className = card.dataset.class;
            playerHero = { ...heroByClass[className], hp: heroByClass[className].maxHp };
            playerWarriors = [];
            gold = 200;
            updateGoldDisplay();
            generateWorld();
            generateEnemies();
            playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
            updateIncomeRate();
            showMap();
        });
    });

    mapCanvas.addEventListener('click', handleMapClick);
    mapCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleMapClick(e.touches[0]); });

    battleCanvas.addEventListener('click', handleBattleClick);
    battleCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleBattleClick(e.touches[0]); });

    tavernBtn.addEventListener('click', openTavern);
    closeTavernBtn.addEventListener('click', showMap);

    teleportBtn.addEventListener('click', () => {
        playerPos = { x: CASTLE_POS.x, y: CASTLE_POS.y };
        playerHero.hp = playerHero.maxHp;
        playerWarriors.forEach(w => w.hp = w.maxHp);
        drawMap();
    });

    menuFromMapBtn.addEventListener('click', showMenu);
    menuFromBattleBtn.addEventListener('click', showMenu);

    fleeBtn.addEventListener('click', fleeBattle);

    endTurnBtn.addEventListener('click', () => {
        if (currentTurn === 'player' && battleActive && !animationInProgress) {
            battlePlayerUnits.forEach(u => u.actedThisTurn = false);
            currentTurn = 'enemy';
            selectedUnitId = null;
            showUnitDetails(null);
            updateTurnQueue();
            drawBattle();
            setTimeout(enemyTurn, 300);
        }
    });

    setInterval(() => {
        if (mapScreen.style.display === 'flex') {
            updateTimer();
            checkIncome();
            drawMap();
        }
    }, 1000);

    setInterval(() => {
        if (mapScreen.style.display === 'flex') {
            checkIncome();
            drawMap();
        }
    }, 60000);

    showMenu();
})();
</script>
